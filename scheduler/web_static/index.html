<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>项目排程与进度管理</title>
    <style>
      :root {
        --bg: #c9dcf8;
        --panel: rgba(255, 255, 255, 0.36);
        --panel-soft: rgba(255, 255, 255, 0.24);
        --text: #10243d;
        --muted: #4c627f;
        --line: rgba(220, 235, 255, 0.72);
        --shadow: 0 22px 48px rgba(10, 36, 73, 0.2);
        --glass-blur: blur(24px) saturate(188%);
        --brand: #2c7ef6;
        --brand-deep: #4b5eff;
        --progress-gradient: linear-gradient(90deg, #5e9dff, #5974ff);
        --good: #0f8a52;
        --warn: #b86b00;
        --bad: #c73e3e;
      }

      * { box-sizing: border-box; }

      body {
        margin: 0;
        font-family: "SF Pro Text", "SF Pro Display", "PingFang SC", "Hiragino Sans GB", "Helvetica Neue", Arial, sans-serif;
        font-size: 18px;
        line-height: 1.52;
        background:
          radial-gradient(circle at 10% 16%, rgba(255, 255, 255, 0.82) 0%, rgba(255, 255, 255, 0) 42%),
          radial-gradient(circle at 82% 2%, rgba(72, 146, 244, 0.56) 0%, rgba(72, 146, 244, 0) 42%),
          radial-gradient(circle at 88% 92%, rgba(79, 168, 255, 0.48) 0%, rgba(79, 168, 255, 0) 46%),
          linear-gradient(135deg, #d7e8ff 0%, #bfd8ff 44%, #d3e4ff 100%),
          var(--bg);
        color: var(--text);
        transition: background 0.35s ease, color 0.35s ease;
        min-height: 100vh;
      }

      body.theme-dark {
        --bg: #0f1725;
        --panel: rgba(18, 32, 56, 0.44);
        --panel-soft: rgba(18, 32, 56, 0.28);
        --text: #edf3ff;
        --muted: #b2c2dd;
        --line: rgba(162, 189, 228, 0.26);
        --shadow: 0 24px 48px rgba(3, 7, 20, 0.58);
        --brand: #5fa9ff;
        --brand-deep: #6b8fff;
        --good: #45d089;
        --warn: #ffb24d;
        --bad: #ff7f8e;
        background:
          radial-gradient(circle at 12% 10%, rgba(89, 142, 241, 0.36) 0%, rgba(89, 142, 241, 0) 43%),
          radial-gradient(circle at 92% 6%, rgba(70, 175, 244, 0.32) 0%, rgba(70, 175, 244, 0) 40%),
          radial-gradient(circle at 80% 90%, rgba(80, 116, 235, 0.33) 0%, rgba(80, 116, 235, 0) 44%),
          linear-gradient(135deg, #0a1323 0%, #11223d 44%, #0d1a31 100%),
          var(--bg);
      }

      .container {
        max-width: 2380px;
        margin: 0 auto;
        padding: 20px 28px 44px 20px;
      }

      .top {
        display: flex;
        justify-content: space-between;
        gap: 12px;
        align-items: flex-end;
        margin-bottom: 14px;
      }

      .title {
        margin: 0;
        font-size: 32px;
      }

      .subtitle {
        margin: 5px 0 0;
        color: var(--muted);
        font-size: 17px;
      }

      .auth-bar {
        display: flex;
        gap: 8px;
        align-items: center;
      }

      .badge {
        border: none;
        background: var(--panel-soft);
        backdrop-filter: var(--glass-blur);
        border-radius: 999px;
        font-size: 15px;
        color: var(--text);
        padding: 6px 12px;
      }

      .status {
        min-height: 36px;
        border: none;
        background: var(--panel-soft);
        backdrop-filter: var(--glass-blur);
        color: var(--text);
        border-radius: 999px;
        padding: 0 13px;
        display: inline-flex;
        align-items: center;
        font-size: 16px;
      }

      .status.ok { color: var(--good); background: rgba(236, 255, 246, 0.62); }
      .status.warn { color: var(--warn); background: rgba(255, 245, 229, 0.66); }
      .status.error { color: var(--bad); background: rgba(255, 237, 239, 0.66); }

      button {
        border: none;
        border-radius: 12px;
        cursor: pointer;
        font-size: 16px;
        font-weight: 600;
        padding: 9px 13px;
        backdrop-filter: var(--glass-blur);
        transition: transform 0.15s ease, box-shadow 0.2s ease, background 0.2s ease;
      }

      button:hover {
        transform: translateY(-1px);
      }

      .btn-primary {
        color: #fff;
        background: linear-gradient(140deg, rgba(57, 136, 255, 0.9), rgba(78, 107, 255, 0.86));
        box-shadow: 0 10px 22px rgba(50, 107, 235, 0.3);
      }

      .btn-secondary {
        color: var(--text);
        background: var(--panel-soft);
      }

      .btn-danger {
        color: #fff;
        background: linear-gradient(140deg, rgba(233, 92, 92, 0.92), rgba(199, 62, 62, 0.9));
      }

      body.theme-dark .badge {
        background: var(--panel-soft);
        color: var(--text);
      }

      body.theme-dark .status {
        background: var(--panel-soft);
        color: var(--text);
      }

      body.theme-dark .status.ok {
        color: #87f0b8;
        background: rgba(18, 55, 37, 0.56);
      }

      body.theme-dark .status.warn {
        color: #ffd28f;
        background: rgba(64, 46, 18, 0.56);
      }

      body.theme-dark .status.error {
        color: #ffb2bd;
        background: rgba(66, 27, 38, 0.56);
      }

      body.theme-dark .btn-secondary {
        color: var(--text);
        background: var(--panel-soft);
      }

      .layout {
        display: grid;
        grid-template-columns: repeat(12, minmax(0, 1fr));
        gap: 14px;
      }

      .panel {
        background: var(--panel);
        border: 1px solid var(--line);
        border-radius: 20px;
        backdrop-filter: var(--glass-blur);
        box-shadow: var(--shadow);
        padding: 16px 20px 16px 16px;
        animation: glassIn 0.35s ease both;
      }

      .panel h2 { margin: 0 0 10px; font-size: 20px; }
      .panel h3 { margin: 0; font-size: 18px; }

      .auth-panel { grid-column: span 12; }
      .main-tabs { grid-column: span 12; }
      .tab-page { grid-column: span 12; display: grid; grid-template-columns: repeat(12, minmax(0, 1fr)); gap: 14px; }
      .admin-users { grid-column: span 4; }
      .project { grid-column: span 4; }
      .project-edit { grid-column: span 6; }
      .phase { grid-column: span 4; }
      .goal { grid-column: span 4; }
      .phase-edit { grid-column: span 6; }
      .goal-edit { grid-column: span 6; }
      .progress { grid-column: span 3; }
      .dashboard { grid-column: span 12; }
      .progress .two-col { grid-template-columns: 1fr; }
      .report-preview { grid-column: span 8; }
      .report-dispatch { grid-column: span 4; }
      .ops { grid-column: span 12; }

      .hidden { display: none !important; }

      .tab-buttons {
        display: flex;
        flex-wrap: wrap;
        gap: 8px;
      }

      .tab-btn {
        border: 1px solid var(--line);
        background: var(--panel-soft);
        color: var(--text);
      }

      .tab-btn.active {
        color: #fff;
        border-color: rgba(255, 255, 255, 0.24);
        background: linear-gradient(138deg, rgba(65, 143, 255, 0.92), rgba(88, 113, 255, 0.92));
      }

      .sub-tab-page {
        margin-top: 12px;
      }

      .field { display: grid; gap: 5px; margin-bottom: 10px; }
      .field label { font-size: 15px; color: var(--muted); }

      input, select, textarea {
        width: 100%;
        border: 1px solid var(--line);
        border-radius: 12px;
        padding: 9px 10px;
        font-size: 17px;
        color: var(--text);
        background: var(--panel-soft);
        backdrop-filter: var(--glass-blur);
      }

      textarea { min-height: 82px; resize: vertical; }
      .markdown-box { min-height: 320px; font-family: "SF Mono", "Menlo", "Consolas", monospace; }
      .report-editor-shell {
        display: grid;
        grid-template-columns:
          minmax(280px, var(--report-editor-left, 0.95fr))
          18px
          minmax(320px, var(--report-editor-right, 1.05fr));
        gap: 0;
        align-items: start;
      }
      .report-editor-shell.dragging {
        user-select: none;
      }
      .report-editor-pane {
        min-width: 0;
        border: 1px solid var(--line);
        border-radius: 18px;
        background: rgba(255, 255, 255, 0.44);
        backdrop-filter: var(--glass-blur);
        box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.28);
        padding: 12px;
      }
      .report-editor-head {
        display: flex;
        justify-content: space-between;
        align-items: center;
        gap: 10px;
        margin-bottom: 8px;
      }
      .report-editor-head label {
        margin: 0;
        font-size: 15px;
        color: var(--muted);
      }
      .report-editor-note {
        margin: 0;
        font-size: 13px;
        color: var(--muted);
      }
      .report-editor-divider {
        position: relative;
        align-self: stretch;
        border: none;
        border-radius: 999px;
        padding: 0;
        background: transparent;
        box-shadow: none;
        cursor: col-resize;
        touch-action: none;
        transition: none;
      }
      .report-editor-divider:hover {
        transform: none;
        box-shadow: none;
      }
      .report-editor-divider::before {
        content: "";
        position: absolute;
        top: 10px;
        bottom: 10px;
        left: 50%;
        width: 4px;
        transform: translateX(-50%);
        border-radius: 999px;
        background: linear-gradient(180deg, rgba(125, 156, 214, 0.22), rgba(88, 129, 205, 0.56), rgba(125, 156, 214, 0.22));
        box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.42);
        transition: background 0.16s ease, box-shadow 0.16s ease;
      }
      .report-editor-divider::after {
        content: "";
        position: absolute;
        top: 50%;
        left: 50%;
        width: 10px;
        height: 44px;
        transform: translate(-50%, -50%);
        border-radius: 999px;
        background:
          radial-gradient(circle at 50% 8px, rgba(95, 126, 186, 0.85) 0 1.5px, transparent 1.8px),
          radial-gradient(circle at 50% 16px, rgba(95, 126, 186, 0.85) 0 1.5px, transparent 1.8px),
          radial-gradient(circle at 50% 24px, rgba(95, 126, 186, 0.85) 0 1.5px, transparent 1.8px),
          radial-gradient(circle at 50% 32px, rgba(95, 126, 186, 0.85) 0 1.5px, transparent 1.8px);
        opacity: 0.72;
        transition: opacity 0.16s ease;
      }
      .report-editor-divider:hover::before,
      .report-editor-shell.dragging .report-editor-divider::before,
      .report-editor-divider:focus-visible::before {
        background: linear-gradient(180deg, rgba(84, 131, 221, 0.32), rgba(63, 120, 232, 0.9), rgba(84, 131, 221, 0.32));
        box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.52), 0 0 0 6px rgba(77, 127, 229, 0.12);
      }
      .report-editor-divider:hover::after,
      .report-editor-shell.dragging .report-editor-divider::after,
      .report-editor-divider:focus-visible::after {
        opacity: 1;
      }
      .report-editor-divider:focus-visible {
        outline: none;
      }
      .report-preview-actions { display: flex; justify-content: space-between; align-items: center; gap: 10px; margin-bottom: 8px; }
      .report-html-preview {
        width: 100%;
        min-height: 520px;
        border: 1px solid var(--line);
        border-radius: 16px;
        background: #fff;
      }

      .two-col { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }

      .hint {
        margin: 2px 0 10px;
        font-size: 15px;
        color: var(--muted);
      }

      .project-grid { display: grid; gap: 18px; }

      .project-card {
        border: 1px solid rgba(167, 199, 242, 0.82);
        border-radius: 22px;
        background: transparent;
        backdrop-filter: none;
        box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.32);
        padding: 16px 20px 16px 16px;
        animation: glassIn 0.42s ease both;
      }

      .project-shell {
        margin-top: 14px;
        padding-top: 10px;
        border-top: 1px solid rgba(160, 195, 240, 0.6);
        display: grid;
        grid-template-columns: minmax(0, 1fr) 340px;
        gap: 16px;
        align-items: start;
      }

      .project-main-col {
        min-width: 0;
        display: grid;
        gap: 14px;
      }

      .project-update {
        border: none;
        border-radius: 16px;
        background: rgba(226, 239, 255, 0.2);
        backdrop-filter: var(--glass-blur);
        box-shadow: 0 14px 28px rgba(34, 80, 143, 0.14), inset 0 1px 0 rgba(255, 255, 255, 0.28);
        padding: 12px 15px 12px 12px;
      }

      .project-update h4 {
        margin: 0 0 8px;
        font-size: 16px;
      }

      .project-update .field {
        margin-bottom: 8px;
      }

      .project-update .field label {
        font-size: 13px;
      }

      .project-update .two-col {
        gap: 8px;
      }

      .project-update textarea {
        min-height: 62px;
      }

      .project-update .btn-primary {
        width: 100%;
      }

      .project-head {
        display: grid;
        gap: 6px;
      }

      .title-line {
        display: flex;
        justify-content: flex-start;
        align-items: center;
        gap: 6px;
      }

      .project-name { margin: 0; font-size: 21px; }
      .meta { margin: 2px 0 0; color: var(--muted); font-size: 15px; }

      .progress-wrap {
        margin-top: 8px;
        margin-right: 14px;
        height: 18px;
        border-radius: 999px;
        background:
          linear-gradient(180deg, rgba(255, 255, 255, 0.44) 0%, rgba(255, 255, 255, 0.12) 42%, rgba(176, 207, 246, 0.2) 100%),
          linear-gradient(90deg, rgba(210, 229, 255, 0.34), rgba(186, 214, 252, 0.24));
        backdrop-filter: blur(10px) saturate(165%);
        -webkit-backdrop-filter: blur(10px) saturate(165%);
        box-shadow:
          0 16px 32px -18px rgba(62, 104, 168, 0.3),
          0 8px 16px -10px rgba(107, 145, 198, 0.22),
          inset 0 1px 0 rgba(255, 255, 255, 0.5),
          inset 0 -1px 0 rgba(132, 168, 223, 0.24);
        overflow: hidden;
      }

      .progress-bar {
        height: 100%;
        border-radius: 999px;
        background-image:
          linear-gradient(180deg, rgba(255, 255, 255, 0.28), rgba(255, 255, 255, 0.06)),
          var(--progress-gradient);
        opacity: 0.98;
        box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.3);
      }

      .chip {
        border-radius: 999px;
        font-size: 14px;
        font-weight: 700;
        padding: 2px 9px;
        display: inline-flex;
        align-items: center;
      }

      .chip.good { color: #107343; background: rgba(202, 247, 225, 0.72); }
      .chip.warn { color: #935b00; background: rgba(255, 236, 198, 0.74); }
      .chip.bad { color: #9e2c3d; background: rgba(255, 215, 221, 0.75); }
      .chip.state-normal { color: #1058b5; background: rgba(205, 226, 255, 0.78); }
      .chip.state-delayed { color: #a22938; background: rgba(255, 214, 220, 0.8); }
      .chip.state-ahead { color: #0e7a4b; background: rgba(201, 243, 224, 0.8); }
      .chip.risk-green { color: #107343; background: rgba(202, 247, 225, 0.72); }
      .chip.risk-yellow { color: #935b00; background: rgba(255, 236, 198, 0.74); }
      .chip.risk-red { color: #9e2c3d; background: rgba(255, 215, 221, 0.75); }

      .goal-progress-cell {
        display: flex;
        align-items: center;
        gap: 8px;
        flex-wrap: wrap;
      }

      .progress-text {
        font-size: 14px;
        font-weight: 600;
      }

      .progress-text.state-normal { color: #1058b5; }
      .progress-text.state-delayed { color: #a22938; font-weight: 700; }
      .progress-text.state-ahead { color: #0e7a4b; }

      .phase-grid { display: grid; gap: 12px; margin-top: 0; }
      .phase-card {
        border: none;
        border-radius: 14px;
        background: rgba(226, 239, 255, 0.2);
        backdrop-filter: var(--glass-blur);
        box-shadow: 0 12px 24px rgba(34, 80, 143, 0.13), inset 0 1px 0 rgba(255, 255, 255, 0.26);
        padding: 10px 14px 10px 10px;
      }

      .phase-head {
        display: flex;
        align-items: center;
        gap: 6px;
      }

      .phase-objective { margin: 4px 0 8px; font-size: 15px; color: var(--muted); }

      table { width: 100%; border-collapse: collapse; font-size: 14px; }
      th, td {
        text-align: left;
        padding: 6px 5px;
        border-bottom: 1px solid rgba(168, 188, 220, 0.45);
        vertical-align: top;
      }
      th { color: var(--muted); }

      .empty {
        border: 1px dashed var(--line);
        border-radius: 12px;
        background: rgba(255, 255, 255, 0.35);
        backdrop-filter: var(--glass-blur);
        color: var(--muted);
        text-align: center;
        padding: 20px;
      }

      .gantt {
        margin-top: 0;
        border: none;
        border-radius: 12px;
        background: rgba(228, 241, 255, 0.16);
        backdrop-filter: var(--glass-blur);
        box-shadow:
          0 20px 38px rgba(28, 74, 138, 0.2),
          0 8px 18px rgba(52, 104, 175, 0.14),
          inset 0 0 0 1px rgba(195, 220, 255, 0.55),
          inset 0 1px 0 rgba(255, 255, 255, 0.34),
          inset 0 -1px 0 rgba(171, 201, 245, 0.28);
        padding: 12px 16px 12px 12px;
      }

      .gantt-title {
        margin: 0 0 8px;
        font-size: 14px;
        color: var(--muted);
      }

      .gantt-scale {
        display: grid;
        grid-template-columns: repeat(5, minmax(0, 1fr));
        gap: 6px;
        margin: 0 0 10px;
        color: var(--muted);
        font-size: 13px;
      }

      .gantt-scale span {
        text-align: right;
        opacity: 0.86;
      }

      .gantt-scale span:first-child {
        text-align: left;
      }

      .gantt-row {
        display: grid;
        grid-template-columns: 220px 1fr;
        gap: 10px;
        align-items: start;
        margin-bottom: 10px;
      }

      .gantt-label {
        font-size: 14px;
        color: var(--text);
      }

      .gantt-label-head {
        display: flex;
        align-items: center;
        gap: 8px;
        min-width: 0;
      }

      .gantt-label-stage {
        flex: 1;
        min-width: 0;
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
        font-size: 15px;
        color: var(--text);
        font-weight: 700;
      }

      .gantt-state-chip {
        flex-shrink: 0;
        font-size: 12px;
        min-width: 62px;
        padding: 1px 10px;
        justify-content: center;
        border: 1px solid transparent;
      }

      .gantt-state-chip.state-normal {
        color: #115ab2;
        background: rgba(205, 226, 255, 0.9);
        border-color: rgba(120, 166, 236, 0.5);
      }

      .gantt-state-chip.state-delayed {
        color: #a22938;
        background: rgba(255, 214, 220, 0.9);
        border-color: rgba(221, 127, 148, 0.45);
      }

      .gantt-state-chip.state-ahead {
        color: #0e7a4b;
        background: rgba(201, 243, 224, 0.9);
        border-color: rgba(94, 188, 146, 0.45);
      }

      .gantt-label-goal {
        margin-top: 3px;
        font-size: 14px;
        color: var(--muted);
        line-height: 1.32;
        white-space: nowrap;
        text-overflow: ellipsis;
        overflow: hidden;
      }

      .gantt-track {
        position: relative;
        margin-right: 14px;
        height: 26px;
        border-radius: 999px;
        background: transparent;
        overflow: hidden;
      }

      body.theme-dark .project-card {
        border-color: rgba(110, 148, 207, 0.46);
        background: transparent;
        box-shadow: inset 0 1px 0 rgba(150, 191, 255, 0.16);
      }

      body.theme-dark .project-shell {
        border-top-color: rgba(96, 134, 190, 0.42);
      }

      body.theme-dark .phase-card {
        border: none;
        background: rgba(15, 30, 53, 0.34);
        box-shadow: 0 14px 26px rgba(4, 10, 22, 0.45), inset 0 1px 0 rgba(130, 173, 244, 0.18);
      }

      body.theme-dark .project-update {
        border: none;
        background: rgba(15, 30, 53, 0.34);
        box-shadow: 0 14px 26px rgba(4, 10, 22, 0.45), inset 0 1px 0 rgba(130, 173, 244, 0.18);
      }

      body.theme-dark .progress-wrap {
        background:
          linear-gradient(180deg, rgba(126, 166, 230, 0.2) 0%, rgba(70, 108, 170, 0.08) 44%, rgba(48, 76, 122, 0.2) 100%),
          linear-gradient(90deg, rgba(56, 84, 126, 0.4), rgba(44, 68, 104, 0.3));
        box-shadow:
          0 16px 32px -18px rgba(10, 18, 33, 0.72),
          0 8px 16px -10px rgba(20, 40, 74, 0.58),
          inset 0 1px 0 rgba(176, 204, 247, 0.2),
          inset 0 -1px 0 rgba(39, 62, 98, 0.26);
      }

      body.theme-dark .progress-bar {
        opacity: 0.92;
        box-shadow: inset 0 1px 0 rgba(214, 231, 255, 0.16);
      }

      body.theme-dark th,
      body.theme-dark td {
        border-bottom-color: rgba(143, 169, 208, 0.28);
      }

      body.theme-dark th {
        color: var(--muted);
      }

      body.theme-dark .empty {
        border-color: var(--line);
        background: rgba(17, 31, 53, 0.44);
      }

      body.theme-dark .gantt {
        border: none;
        background: rgba(15, 30, 53, 0.3);
        box-shadow:
          0 22px 42px rgba(2, 8, 20, 0.56),
          0 10px 20px rgba(13, 28, 56, 0.42),
          inset 0 0 0 1px rgba(103, 143, 205, 0.42),
          inset 0 1px 0 rgba(130, 173, 244, 0.22),
          inset 0 -1px 0 rgba(73, 104, 156, 0.28);
      }

      body.theme-dark .gantt-track {
        background: transparent;
      }

      body.theme-dark .gantt-fill {
        box-shadow: inset 0 1px 0 rgba(214, 231, 255, 0.14);
        opacity: 0.88;
      }

      body.theme-dark .gantt-bar {
        background:
          linear-gradient(180deg, rgba(126, 166, 230, 0.2) 0%, rgba(70, 108, 170, 0.08) 44%, rgba(48, 76, 122, 0.2) 100%),
          linear-gradient(90deg, rgba(56, 84, 126, 0.4), rgba(44, 68, 104, 0.3));
        backdrop-filter: blur(10px) saturate(170%);
        -webkit-backdrop-filter: blur(10px) saturate(170%);
        box-shadow:
          0 22px 44px -22px rgba(10, 18, 33, 0.72),
          0 10px 22px -12px rgba(20, 40, 74, 0.58),
          inset 0 1px 0 rgba(176, 204, 247, 0.2),
          inset 0 -1px 0 rgba(39, 62, 98, 0.26);
      }

      body.theme-dark .gantt-bar.state-normal,
      body.theme-dark .gantt-bar.state-ahead {
        background:
          linear-gradient(180deg, rgba(131, 170, 232, 0.26) 0%, rgba(84, 124, 194, 0.1) 44%, rgba(61, 92, 146, 0.22) 100%),
          linear-gradient(90deg, rgba(74, 111, 176, 0.45), rgba(52, 81, 134, 0.34));
        box-shadow:
          0 22px 44px -22px rgba(12, 28, 56, 0.7),
          0 10px 22px -12px rgba(24, 47, 86, 0.56),
          inset 0 1px 0 rgba(190, 214, 248, 0.22),
          inset 0 -1px 0 rgba(41, 66, 108, 0.3);
      }

      body.theme-dark .gantt-bar.state-delayed {
        background:
          linear-gradient(180deg, rgba(166, 118, 138, 0.18) 0%, rgba(116, 75, 95, 0.08) 44%, rgba(95, 62, 81, 0.18) 100%),
          linear-gradient(90deg, rgba(128, 86, 106, 0.32), rgba(95, 63, 82, 0.24));
        box-shadow:
          0 22px 44px -22px rgba(35, 18, 25, 0.65),
          0 10px 22px -12px rgba(62, 33, 44, 0.48),
          inset 0 1px 0 rgba(238, 198, 211, 0.2),
          inset 0 -1px 0 rgba(81, 51, 65, 0.3);
      }

      .gantt-bar {
        position: absolute;
        top: 4px;
        bottom: 4px;
        border-radius: 999px;
        overflow: hidden;
        background:
          linear-gradient(180deg, rgba(255, 255, 255, 0.44) 0%, rgba(255, 255, 255, 0.12) 42%, rgba(176, 207, 246, 0.2) 100%),
          linear-gradient(90deg, rgba(210, 229, 255, 0.34), rgba(186, 214, 252, 0.24));
        backdrop-filter: blur(10px) saturate(165%);
        -webkit-backdrop-filter: blur(10px) saturate(165%);
        box-shadow:
          0 22px 44px -22px rgba(62, 104, 168, 0.34),
          0 10px 22px -12px rgba(107, 145, 198, 0.26),
          inset 0 1px 0 rgba(255, 255, 255, 0.5),
          inset 0 -1px 0 rgba(132, 168, 223, 0.24);
      }

      .gantt-bar.state-normal,
      .gantt-bar.state-ahead {
        background:
          linear-gradient(180deg, rgba(217, 233, 255, 0.5) 0%, rgba(195, 219, 250, 0.18) 42%, rgba(168, 199, 242, 0.28) 100%),
          linear-gradient(90deg, rgba(198, 222, 255, 0.42), rgba(173, 206, 248, 0.3));
        box-shadow:
          0 22px 44px -22px rgba(76, 118, 184, 0.3),
          0 10px 22px -12px rgba(110, 150, 208, 0.22),
          inset 0 1px 0 rgba(255, 255, 255, 0.52),
          inset 0 -1px 0 rgba(120, 158, 218, 0.26);
      }

      .gantt-bar.state-delayed {
        background:
          linear-gradient(180deg, rgba(255, 223, 230, 0.44) 0%, rgba(255, 210, 221, 0.14) 42%, rgba(240, 186, 200, 0.2) 100%),
          linear-gradient(90deg, rgba(249, 218, 227, 0.34), rgba(238, 196, 208, 0.24));
        box-shadow:
          0 22px 44px -22px rgba(146, 88, 105, 0.24),
          0 10px 22px -12px rgba(174, 111, 131, 0.18),
          inset 0 1px 0 rgba(255, 242, 246, 0.5),
          inset 0 -1px 0 rgba(196, 136, 154, 0.2);
      }

      .gantt-bar::before {
        content: none;
      }

      .gantt-bar::after {
        content: none;
      }

      .gantt-fill {
        position: absolute;
        left: 0;
        top: 0;
        bottom: 0;
        border-radius: 999px;
        background-image:
          linear-gradient(180deg, rgba(255, 255, 255, 0.28), rgba(255, 255, 255, 0.06)),
          var(--progress-gradient);
        backdrop-filter: blur(1px) saturate(132%);
        -webkit-backdrop-filter: blur(1px) saturate(132%);
        z-index: 1;
        opacity: 0.92;
        box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.3);
      }

      .check-line {
        display: inline-flex;
        align-items: center;
        gap: 8px;
      }

      .check-line input[type="checkbox"] {
        width: 16px;
        height: 16px;
        margin: 0;
      }

      @keyframes glassIn {
        from {
          opacity: 0;
          transform: translateY(6px) scale(0.994);
        }
        to {
          opacity: 1;
          transform: translateY(0) scale(1);
        }
      }

      @media (max-width: 1160px) {
        .admin-users, .project, .project-edit, .phase, .goal, .phase-edit, .goal-edit, .dashboard, .progress, .report-preview, .report-dispatch { grid-column: span 12; }
      }

      @media (max-width: 760px) {
        .top { flex-direction: column; align-items: flex-start; }
        .two-col { grid-template-columns: 1fr; }
        .report-editor-shell { grid-template-columns: 1fr; }
        .report-editor-divider { display: none; }
        .project-shell { grid-template-columns: 1fr; }
        .gantt-row { grid-template-columns: 1fr; }
        .gantt-label-stage { white-space: normal; }
        .gantt-scale { font-size: 11px; gap: 4px; }
        .progress-wrap,
        .gantt-track { margin-right: 8px; }
      }
    </style>
  </head>
  <body>
    <div class="container">
      <header class="top">
        <div>
          <h1 class="title">项目排程与进度管理平台</h1>
          <p class="subtitle">支持管理员/负责人登录权限，实时看板与甘特图时间轴。</p>
        </div>
        <div class="auth-bar">
          <div id="currentUser" class="badge">未登录</div>
          <button id="themeToggle" class="btn-secondary" type="button">夜间模式</button>
          <button id="refreshNow" class="btn-secondary hidden" type="button">立即刷新</button>
          <button id="logoutBtn" class="btn-danger hidden" type="button">登出</button>
        </div>
      </header>

      <div id="statusBar" class="status">等待初始化...</div>

      <main class="layout" style="margin-top: 12px;">
        <section class="panel auth-panel" id="authPanel">
          <h2>账户认证</h2>

          <form id="bootstrapForm" class="hidden">
            <p class="hint">系统尚未初始化账号。请先创建第一个管理员。</p>
            <div class="two-col">
              <div class="field">
                <label for="bootstrapUsername">管理员用户名</label>
                <input id="bootstrapUsername" required />
              </div>
              <div class="field">
                <label for="bootstrapPassword">管理员密码</label>
                <input id="bootstrapPassword" type="password" minlength="6" required />
              </div>
            </div>
            <button class="btn-primary" type="submit">初始化管理员</button>
          </form>

          <form id="loginForm" class="hidden">
            <div class="two-col">
              <div class="field">
                <label for="loginUsername">用户名</label>
                <input id="loginUsername" required />
              </div>
              <div class="field">
                <label for="loginPassword">密码</label>
                <input id="loginPassword" type="password" minlength="6" required />
              </div>
            </div>
            <button class="btn-primary" type="submit">登录</button>
          </form>
        </section>

        <section class="panel main-tabs hidden" id="mainTabsPanel">
          <div class="tab-buttons">
            <button id="tabDashboardBtn" class="tab-btn active" type="button">看板与配置</button>
            <button id="tabReportsBtn" class="tab-btn hidden" type="button">报表与邮件</button>
            <button id="tabSmtpBtn" class="tab-btn hidden" type="button">SMTP 配置</button>
            <button id="tabOpsBtn" class="tab-btn hidden" type="button">创建与维护</button>
            <button id="tabAdminBtn" class="tab-btn hidden" type="button">管理员入口</button>
          </div>
        </section>

        <section class="tab-page hidden" id="dashboardTabPage">
          <section class="panel dashboard hidden" id="dashboardPanel">
            <h2>实时项目看板</h2>
            <div id="dashboard" class="project-grid"></div>
          </section>

          <section class="panel progress hidden" id="progressPanel">
            <h2>更新进度</h2>
            <form id="progressForm">
              <div class="two-col">
                <div class="field">
                  <label for="progressProjectId">项目</label>
                  <select id="progressProjectId" required></select>
                </div>
                <div class="field">
                  <label for="progressGoalId">目标（仅显示你可更新的）</label>
                  <select id="progressGoalId" required></select>
                </div>
              </div>
              <div class="two-col">
                <div class="field">
                  <label for="progressDate">日期</label>
                  <input id="progressDate" type="date" required />
                </div>
                <div id="progressRequirementFields" class="two-col" style="grid-column: span 2;">
                  <div class="field">
                    <label for="progressRequirementTotal">需求总数</label>
                    <input id="progressRequirementTotal" type="number" min="0" step="1" />
                  </div>
                  <div class="field">
                    <label for="progressRequirementDone">已完成需求数</label>
                    <input id="progressRequirementDone" type="number" min="0" step="1" />
                  </div>
                </div>
                <div class="field hidden" id="progressPercentField">
                  <label for="progressValue">完成率 0-100</label>
                  <input id="progressValue" type="number" min="0" max="100" step="0.01" />
                </div>
                <div class="field hidden" id="progressRemainingDiField">
                  <label for="progressRemainingDi">剩余 DI</label>
                  <input id="progressRemainingDi" type="number" min="0" step="0.01" />
                </div>
              </div>
              <p class="hint" id="progressInputHint">需求型目标按“总数+已完成”自动计算进度。</p>
              <div class="field">
                <label for="progressUpdatedBy">更新人</label>
                <input id="progressUpdatedBy" value="web_user" required />
              </div>
              <div class="field">
                <label for="progressNote">备注（回退必填）</label>
                <textarea id="progressNote"></textarea>
              </div>
              <button class="btn-primary" type="submit">提交进度</button>
            </form>
          </section>
        </section>

        <section class="tab-page hidden" id="smtpTabPage">
          <section class="panel report-dispatch hidden admin-only" id="smtpConfigPanel">
            <h2>SMTP 参数配置</h2>
            <form id="smtpConfigForm">
              <div class="field">
                <label for="smtpHost">SMTP Host</label>
                <input id="smtpHost" placeholder="smtp.example.com" />
              </div>
              <div class="field">
                <label for="smtpPort">SMTP Port</label>
                <input id="smtpPort" type="number" min="1" max="65535" step="1" required />
              </div>
              <div class="field">
                <label for="smtpUser">SMTP 用户名</label>
                <input id="smtpUser" placeholder="user@example.com" />
              </div>
              <div class="field">
                <label for="smtpPass">SMTP 密码</label>
                <input id="smtpPass" type="password" placeholder="保持为空则不修改" />
              </div>
              <div class="field">
                <label for="smtpMailFrom">发件人邮箱</label>
                <input id="smtpMailFrom" placeholder="pm-bot@example.com" />
              </div>
              <button class="btn-primary" type="submit">保存 SMTP 配置</button>
            </form>
            <div id="smtpSummary" class="hint" style="margin-top: 10px;">尚未加载 SMTP 配置。</div>
          </section>
        </section>

        <section class="tab-page hidden" id="reportsTabPage">
          <section class="panel report-preview hidden admin-only" id="reportPreviewPanel">
            <h2>日报/周报/月报预览与编辑</h2>
            <form id="reportPreviewForm">
              <div class="two-col">
                <div class="field">
                  <label for="reportPeriod">报表周期</label>
                  <select id="reportPeriod">
                    <option value="daily">日报</option>
                    <option value="weekly">周报</option>
                    <option value="monthly">月报</option>
                  </select>
                </div>
                <div class="field">
                  <label for="reportDate">统计日期</label>
                  <input id="reportDate" type="date" required />
                </div>
              </div>
              <button class="btn-secondary" type="submit">加载预览</button>
            </form>

            <div class="field" style="margin-top: 10px;">
              <label for="reportSubject">邮件主题</label>
              <input id="reportSubject" readonly />
            </div>
            <div class="field">
              <label for="reportRecipients">发送成员（每行或逗号分隔邮箱）</label>
              <textarea id="reportRecipients" placeholder="owner@example.com\npm@example.com"></textarea>
            </div>
            <div class="field">
              <div id="reportEditorShell" class="report-editor-shell">
                <section class="report-editor-pane">
                  <div class="report-editor-head">
                    <label for="reportMarkdown">报表内容（支持编辑）</label>
                    <span class="report-editor-note">输入后自动刷新图表</span>
                  </div>
                  <textarea id="reportMarkdown" class="markdown-box"></textarea>
                </section>
                <button
                  id="reportEditorDivider"
                  class="report-editor-divider"
                  type="button"
                  aria-label="拖拽调整报表编辑区宽度"
                  title="拖拽调整左右宽度"
                ></button>
                <section class="report-editor-pane">
                  <div class="report-preview-actions">
                    <label for="reportHtmlPreview">可视预览（图表）</label>
                    <button id="reportRenderBtn" class="btn-secondary" type="button">立即刷新</button>
                  </div>
                  <iframe id="reportHtmlPreview" class="report-html-preview" sandbox=""></iframe>
                </section>
              </div>
            </div>
            <div class="field">
              <label for="reportSkipToday" class="check-line">
                <input id="reportSkipToday" type="checkbox" />
                跳过今日定时并立即发送
              </label>
            </div>
            <div class="tab-buttons">
              <button id="reportExportDocxBtn" class="btn-secondary" type="button">导出 Word(.docx)</button>
              <button id="reportExportOutlookBtn" class="btn-secondary" type="button">导出 Outlook 邮件(.eml)</button>
              <button id="reportSendNowBtn" class="btn-primary" type="button">立即发送</button>
            </div>
          </section>

          <section class="panel report-dispatch hidden admin-only" id="reportDispatchPanel">
            <h2>邮件定时配置</h2>
            <form id="reportDispatchForm">
              <div class="field">
                <label for="dispatchPeriod">配置周期</label>
                <select id="dispatchPeriod">
                  <option value="daily">日报</option>
                  <option value="weekly">周报</option>
                  <option value="monthly">月报</option>
                </select>
              </div>
              <div class="field">
                <label for="dispatchSendTime">发送时间</label>
                <input id="dispatchSendTime" type="time" required />
              </div>
              <div class="field">
                <label for="dispatchRecipients">发送成员（每行或逗号分隔邮箱）</label>
                <textarea id="dispatchRecipients" placeholder="owner@example.com\npm@example.com"></textarea>
              </div>
              <div class="field">
                <label for="dispatchEnabled" class="check-line">
                  <input id="dispatchEnabled" type="checkbox" />
                  启用该周期定时
                </label>
              </div>
              <button class="btn-primary" type="submit">保存定时配置</button>
            </form>
            <div id="dispatchSummary" class="hint" style="margin-top: 10px;">尚未加载配置。</div>
          </section>
        </section>

        <section class="tab-page hidden" id="opsTabPage">
          <section class="panel ops hidden admin-only" id="opsPanel">
            <h2>创建与维护</h2>
            <div class="tab-buttons">
              <button id="opsProjectBtn" class="tab-btn active" type="button">创建项目</button>
              <button id="opsProjectEditBtn" class="tab-btn" type="button">修改项目/参与者</button>
              <button id="opsPhaseBtn" class="tab-btn" type="button">添加阶段</button>
              <button id="opsGoalBtn" class="tab-btn" type="button">添加目标</button>
              <button id="opsPhaseEditBtn" class="tab-btn" type="button">修改/删除阶段</button>
              <button id="opsGoalEditBtn" class="tab-btn" type="button">修改/删除目标</button>
            </div>

            <section class="sub-tab-page project" id="projectPanel">
              <form id="projectForm">
                <div class="field">
                  <label for="projectName">项目名称</label>
                  <input id="projectName" required />
                </div>
                <div class="field">
                  <label for="projectDeadline">项目截止日期</label>
                  <input id="projectDeadline" type="date" required />
                </div>
                <div class="field">
                  <label for="projectParticipants">参与者（每行：姓名,邮箱）</label>
                  <textarea id="projectParticipants" required placeholder="张三,zhangsan@example.com\n李四,lisi@example.com"></textarea>
                </div>
                <button class="btn-primary" type="submit">创建项目</button>
              </form>
            </section>

            <section class="sub-tab-page project-edit hidden" id="projectEditPanel">
              <form id="projectEditForm">
                <div class="field">
                  <label for="projectEditId">选择项目</label>
                  <select id="projectEditId" required></select>
                </div>
                <div class="field">
                  <label for="projectEditName">项目名称</label>
                  <input id="projectEditName" required />
                </div>
                <div class="field">
                  <label for="projectEditDeadline">项目截止日期</label>
                  <input id="projectEditDeadline" type="date" required />
                </div>
                <div class="field">
                  <label for="projectEditParticipants">参与者（每行：姓名,邮箱）</label>
                  <textarea id="projectEditParticipants" required placeholder="张三,zhangsan@example.com\n李四,lisi@example.com"></textarea>
                </div>
                <button class="btn-primary" type="submit">保存项目与参与者</button>
              </form>
            </section>

            <section class="sub-tab-page phase hidden" id="phasePanel">
              <form id="phaseForm">
                <div class="field">
                  <label for="phaseProjectId">所属项目</label>
                  <select id="phaseProjectId" required></select>
                </div>
                <div class="field">
                  <label for="phaseName">阶段名称</label>
                  <input id="phaseName" required />
                </div>
                <div class="field">
                  <label for="phaseObjective">阶段目标</label>
                  <textarea id="phaseObjective" required></textarea>
                </div>
                <button class="btn-primary" type="submit">添加阶段</button>
              </form>
            </section>

            <section class="sub-tab-page goal hidden" id="goalPanel">
              <form id="goalForm">
                <div class="field">
                  <label for="goalPhaseId">所属阶段</label>
                  <select id="goalPhaseId" required></select>
                </div>
                <div class="field">
                  <label for="goalOwnerId">负责人</label>
                  <select id="goalOwnerId" required></select>
                </div>
                <div class="field">
                  <label for="goalType">目标类型</label>
                  <select id="goalType" required>
                    <option value="requirement">需求型（按完成率）</option>
                    <option value="issue">问题单型（按 剩余DI-目标DI）</option>
                    <option value="task">事务型（按百分比手动更新）</option>
                  </select>
                </div>
                <div class="field">
                  <label for="goalTitle">目标标题</label>
                  <input id="goalTitle" required />
                </div>
                <div class="field" id="goalRequirementPriorityField">
                  <label for="goalRequirementPriority">需求优先级（1 最高，5 最低）</label>
                  <select id="goalRequirementPriority">
                    <option value="">不指定</option>
                    <option value="1">P1</option>
                    <option value="2">P2</option>
                    <option value="3">P3</option>
                    <option value="4">P4</option>
                    <option value="5">P5</option>
                  </select>
                </div>
                <div id="goalIssueFields" class="hidden">
                  <div class="field">
                    <label for="goalIssueModule">问题单模块</label>
                    <input id="goalIssueModule" placeholder="例如：支付、订单、权限" />
                  </div>
                  <div class="field">
                    <label for="goalIssueTotalDi">问题单总 DI</label>
                    <input id="goalIssueTotalDi" type="number" min="0.01" step="0.01" />
                  </div>
                  <div class="field">
                    <label for="goalIssueTargetDi">问题单目标 DI</label>
                    <input id="goalIssueTargetDi" type="number" min="0" step="0.01" placeholder="例如：40" />
                  </div>
                </div>
                <div class="two-col">
                  <div class="field">
                    <label for="goalMilestoneDate">里程碑日期</label>
                    <input id="goalMilestoneDate" type="date" required />
                  </div>
                  <div class="field">
                    <label for="goalDeadline">目标截止日期</label>
                    <input id="goalDeadline" type="date" required />
                  </div>
                </div>
                <div class="field">
                  <label for="goalWeight">权重</label>
                  <input id="goalWeight" type="number" min="0.01" step="0.01" value="1" required />
                </div>
                <div class="field">
                  <label for="goalNote">目标备注</label>
                  <textarea id="goalNote" placeholder="补充目标背景、范围说明、依赖等，悬停可查看"></textarea>
                </div>
                <p class="hint">权重仅用于项目完成率聚合，不等于 DI。需求型默认按优先级映射（P1=5...P5=1）；问题单型默认权重为 1，建议按业务影响手工调整。</p>
                <button class="btn-primary" type="submit">添加目标</button>
              </form>
            </section>

            <section class="sub-tab-page phase-edit hidden" id="phaseEditPanel">
              <form id="phaseEditForm">
                <div class="field">
                  <label for="phaseEditId">选择阶段</label>
                  <select id="phaseEditId" required></select>
                </div>
                <div class="field">
                  <label for="phaseEditName">阶段名称</label>
                  <input id="phaseEditName" required />
                </div>
                <div class="field">
                  <label for="phaseEditObjective">阶段目标</label>
                  <textarea id="phaseEditObjective" required></textarea>
                </div>
                <div class="field">
                  <label for="phaseEditOrder">排序</label>
                  <input id="phaseEditOrder" type="number" min="1" step="1" />
                </div>
                <div class="tab-buttons">
                  <button class="btn-primary" type="submit">保存阶段</button>
                  <button class="btn-danger" id="phaseDeleteBtn" type="button">删除阶段</button>
                </div>
              </form>
            </section>

            <section class="sub-tab-page goal-edit hidden" id="goalEditPanel">
              <form id="goalEditForm">
                <div class="field">
                  <label for="goalEditId">选择目标</label>
                  <select id="goalEditId" required></select>
                </div>
                <div class="field">
                  <label for="goalEditOwnerId">负责人</label>
                  <select id="goalEditOwnerId" required></select>
                </div>
                <div class="field">
                  <label for="goalEditType">目标类型</label>

      function todayISO() {
        return new Date().toISOString().slice(0, 10);

      function resolveInitialTheme() {
        if (state.theme === "dark" || state.theme === "light") {
          return state.theme;
        }
        if (window.matchMedia && window.matchMedia("(prefers-color-scheme: dark)").matches) {
          return "dark";
        }
        return "light";
      }

      function applyTheme(theme) {
        const useDark = theme === "dark";
        document.body.classList.toggle("theme-dark", useDark);
        state.theme = useDark ? "dark" : "light";
        localStorage.setItem(THEME_KEY, state.theme);
        dom.themeToggle.textContent = useDark ? "浅色模式" : "夜间模式";
      }

      function toggleTheme() {
        applyTheme(state.theme === "dark" ? "light" : "dark");
      }

      function escapeHtml(value) {
        return String(value)
          .replace(/&/g, "&amp;")
          .replace(/</g, "&lt;")
          .replace(/>/g, "&gt;")
          .replace(/\"/g, "&quot;")
          .replace(/'/g, "&#39;");
      }

      function clearAuth() {
        state.token = "";
        state.me = null;
        localStorage.removeItem(TOKEN_KEY);
      }

      function setToken(token) {
        state.token = token;
        localStorage.setItem(TOKEN_KEY, token);
      }

      function authHeader() {
        return state.token ? { Authorization: `Bearer ${state.token}` } : {};
      }

      async function requestJson(path, options = {}) {
        const headers = {
          "Content-Type": "application/json",
          ...authHeader(),
          ...(options.headers || {}),
        };

        const resp = await fetch(path, { ...options, headers });
        let data = null;
        try {
          data = await resp.json();
        } catch (err) {
          data = null;
        }

        if (!resp.ok) {
          const detail = data && data.detail ? data.detail : `请求失败: ${resp.status}`;
          if (resp.status === 401) {
            clearAuth();
            updateAuthUi();
          }
          throw new Error(detail);
        }
        return data;
      }

      async function requestBlob(path, options = {}) {
        const headers = {
          ...authHeader(),
          ...(options.headers || {}),
        };
        const resp = await fetch(path, { ...options, headers });
        const blob = await resp.blob();

        if (!resp.ok) {
          let detail = `请求失败: ${resp.status}`;
          try {
            const data = JSON.parse(await blob.text());
            if (data && data.detail) {
              detail = data.detail;
            }
          } catch (err) {
            detail = `请求失败: ${resp.status}`;
          }
          if (resp.status === 401) {
            clearAuth();
            updateAuthUi();
          }
          throw new Error(detail);
        }

        const disposition = resp.headers.get("content-disposition") || "";
        const filenameMatch = disposition.match(/filename="?([^"]+)"?/i);
        return {
          blob,
          filename: filenameMatch ? filenameMatch[1] : "download.bin",
        };
      }

      function triggerDownload(blob, filename) {
        const url = URL.createObjectURL(blob);
        const anchor = document.createElement("a");
        anchor.href = url;
        anchor.download = filename;
        document.body.appendChild(anchor);
        anchor.click();
        anchor.remove();
        setTimeout(() => URL.revokeObjectURL(url), 0);
      }

      function parseParticipants(raw) {
        return raw
          .split("\n")
          .map((line) => line.trim())
          .filter(Boolean)
          .map((line) => {
            const parts = line.split(",");
            if (parts.length < 2) {
              throw new Error(`参与者格式错误: ${line}`);
            }
            const name = parts[0].trim();
            const email = parts.slice(1).join(",").trim();
            if (!name || !email) {
              throw new Error(`参与者格式错误: ${line}`);
            }
            return { name, email };
          });
      }

      function parseEmailList(raw) {
        return Array.from(
          new Set(
            raw
              .split(/[\n,]/)
              .map((item) => item.trim().toLowerCase())
              .filter(Boolean)
          )
        );
      }

        return (emails || []).join("\n");

      function normalizeReportEditorSplit(value) {
        const parsed = Number(value);
        if (!Number.isFinite(parsed)) return 0.48;
        return Math.min(0.68, Math.max(0.32, parsed));
      }

      function applyReportEditorSplit(value, { persist = true } = {}) {
        const normalized = normalizeReportEditorSplit(value);
        state.reportEditorSplit = normalized;
        dom.reportEditorShell.style.setProperty("--report-editor-left", `${normalized.toFixed(4)}fr`);
        dom.reportEditorShell.style.setProperty("--report-editor-right", `${(1 - normalized).toFixed(4)}fr`);
        if (persist) {
          localStorage.setItem(REPORT_EDITOR_SPLIT_KEY, normalized.toFixed(4));
        }
      }

      function updateReportEditorSplitByClientX(clientX) {
        if (!dom.reportEditorShell || window.innerWidth <= 760) return;
        const shellRect = dom.reportEditorShell.getBoundingClientRect();
        const dividerWidth = dom.reportEditorDivider ? dom.reportEditorDivider.getBoundingClientRect().width : 18;
        const availableWidth = shellRect.width - dividerWidth;
        if (availableWidth <= 0) return;
        const rawLeftWidth = clientX - shellRect.left - dividerWidth / 2;
        const clampedLeftWidth = Math.min(availableWidth, Math.max(0, rawLeftWidth));
        applyReportEditorSplit(clampedLeftWidth / availableWidth);
      }

      function handleReportEditorDividerPointerDown(event) {
        if (event.button !== 0 || !dom.reportEditorShell || window.innerWidth <= 760) return;
        event.preventDefault();
        dom.reportEditorShell.classList.add("dragging");
        document.body.style.cursor = "col-resize";
        if (dom.reportEditorDivider.setPointerCapture) {
          dom.reportEditorDivider.setPointerCapture(event.pointerId);
        }
        updateReportEditorSplitByClientX(event.clientX);

        const handleMove = (moveEvent) => {
          updateReportEditorSplitByClientX(moveEvent.clientX);
        };

        const finishDrag = () => {
          window.removeEventListener("pointermove", handleMove);
          window.removeEventListener("pointerup", finishDrag);
          window.removeEventListener("pointercancel", finishDrag);
          dom.reportEditorShell.classList.remove("dragging");
          document.body.style.cursor = "";
          if (dom.reportEditorDivider.releasePointerCapture) {
            try {
              dom.reportEditorDivider.releasePointerCapture(event.pointerId);
            } catch (err) {}
          }
        };

        window.addEventListener("pointermove", handleMove);
        window.addEventListener("pointerup", finishDrag);
        window.addEventListener("pointercancel", finishDrag);
      }

      function upsertSelectOptions(selectEl, options, preferred = "") {
        const keep = preferred || selectEl.value;
        selectEl.innerHTML = "";

        if (!options.length) {
          const opt = document.createElement("option");
          opt.value = "";
          opt.textContent = "暂无可选项";

        options.forEach((item) => {

          opt.textContent = item.label;
          if (String(item.value) === String(keep)) {
            opt.selected = true;

          selectEl.appendChild(opt);
        });

        if (!selectEl.value && options.length) {
          selectEl.value = String(options[0].value);
        }
      }

      function defaultWeightForPriority(priority) {
        const p = Number(priority);
        if (!Number.isInteger(p) || p < 1 || p > 5) return 1;
        return 6 - p;
