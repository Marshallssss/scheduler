      function goalTypeLabel(goal) {
        if (goal.goal_type === "issue") {
          return `问题单 / ${goal.issue_module || "未分模块"} / 目标DI:${Number(goal.issue_target_di ?? 0).toFixed(2)}`;
        }
        if (goal.goal_type === "task") {
          return "事务 / 手动进度";
        }
        if (goal.requirement_priority) {
          return `需求 / P${goal.requirement_priority}`;
        }
        return "需求 / 未分级";
      }

      function goalProgressText(goal) {
        const percent = Number(goal.progress_percent || 0).toFixed(2);
        if (goal.goal_type === "issue") {
          const remaining = Number(goal.remaining_di ?? goal.issue_total_di ?? 0);
          const target = Number(goal.issue_target_di ?? 0);
          const gap = remaining - target;
          return `${percent}% / 剩余DI:${remaining.toFixed(2)} / 目标DI:${target.toFixed(2)} / 差值:${gap.toFixed(2)}`;
        }
        if (goal.goal_type === "task") {
          return `${percent}% / 手动`;
        }
        return `${percent}% / 需求:${Number(goal.requirement_done_count ?? 0)}/${Number(goal.requirement_total_count ?? 0)}`;
      }

      function normalizeProgressState(value) {
        if (value === "delayed" || value === "ahead") return value;
        return "normal";
      }

      function progressStateLabel(value) {
        const state = normalizeProgressState(value);
        if (state === "delayed") return "delay";
        if (state === "ahead") return "提前";
        return "正常";
      }

      function progressStateClass(value) {
        const state = normalizeProgressState(value);
        if (state === "delayed") return "state-delayed";
        if (state === "ahead") return "state-ahead";
        return "state-normal";
      }

      function goalRiskClass(goal) {
        const progress = Number(goal.progress_percent || 0);
        const today = new Date(`${todayISO()}T00:00:00`);
        const deadline = new Date(`${goal.deadline}T00:00:00`);
        const daysLeft = Math.floor((deadline - today) / 86400000);
        if (daysLeft <= 1 && progress < 90) return "risk-red";
        if (daysLeft <= 3 && progress < 80) return "risk-yellow";
        return "risk-green";
      }

      function goalRiskLabel(goal) {
        const riskClass = goalRiskClass(goal);
        if (riskClass === "risk-red") return "截止前1天<90%，红色预警";
        if (riskClass === "risk-yellow") return "截止前3天<80%，黄色预警";
        return "进度正常";
      }

      function chipClass(value) {
        const n = Number(value);
        if (n >= 80) return "good";
        if (n >= 40) return "warn";
        return "bad";
      }

      function toDateNumber(iso) {
        return new Date(`${iso}T00:00:00`).getTime();
      }

      function renderGantt(project) {
        const goals = [];
        project.phases.forEach((phase) => {
          phase.goals.forEach((goal) => {
            goals.push({
              ...goal,
              phaseName: phase.name,
            });
          });
        });

        if (!goals.length) {
          return '<div class="empty" style="padding: 12px;">暂无目标，无法绘制甘特图</div>';
        }

        const starts = goals.map((g) => toDateNumber(g.milestone_date));
        const ends = goals.map((g) => toDateNumber(g.deadline));
        const minStart = Math.min(...starts);
        const maxEnd = Math.max(...ends);
        const totalDays = Math.max(1, Math.floor((maxEnd - minStart) / 86400000) + 1);
        const scaleHtml = [0, 0.25, 0.5, 0.75, 1]
          .map((ratio) => {
            const offsetDays = Math.round((totalDays - 1) * ratio);
            const tick = new Date(minStart + offsetDays * 86400000).toISOString().slice(0, 10);
            return `<span>${tick}</span>`;
          })
          .join("");

        const rows = goals
          .sort((a, b) => {
            const diff = toDateNumber(a.milestone_date) - toDateNumber(b.milestone_date);
            if (diff !== 0) return diff;
            return a.id - b.id;
          })
          .map((goal) => {
            const startDay = Math.floor((toDateNumber(goal.milestone_date) - minStart) / 86400000);
            const duration = Math.max(1, Math.floor((toDateNumber(goal.deadline) - toDateNumber(goal.milestone_date)) / 86400000) + 1);
            const left = (startDay / totalDays) * 100;
            const width = (duration / totalDays) * 100;
            const fill = Math.max(0, Math.min(100, Number(goal.progress_percent || 0)));
            const stateClass = progressStateClass(goal.progress_state);
            const stateLabel = progressStateLabel(goal.progress_state);
            const noteText = goal.note ? ` | 备注：${goal.note}` : "";
            const riskText = goal.risk_note ? ` | 风险补充：${goal.risk_note}` : "";

            return `<div class="gantt-row">
              <div class="gantt-label" title="${escapeHtml(goal.phaseName)} / ${escapeHtml(goal.title)}${escapeHtml(noteText)}${escapeHtml(riskText)}">
                <div class="gantt-label-head">
                  <div class="gantt-label-stage">${escapeHtml(goal.title)}</div>
                  <span class="chip ${stateClass} gantt-state-chip">${escapeHtml(stateLabel)}</span>
                </div>
                <div class="gantt-label-goal">${escapeHtml(goal.phaseName)}</div>
              </div>
              <div>
                <div class="gantt-track">
                  <div class="gantt-bar ${stateClass}" style="left:${left}%; width:${Math.max(1, width)}%;">
                    <div class="gantt-fill" style="width:${fill}%;"></div>
                  </div>
                </div>
              </div>
            </div>`;
          })
          .join("");

        const range = `${new Date(minStart).toISOString().slice(0, 10)} ~ ${new Date(maxEnd).toISOString().slice(0, 10)}`;
        return `<div class="gantt"><p class="gantt-title">甘特图范围：${range}</p><div class="gantt-scale">${scaleHtml}</div>${rows}</div>`;
      }

      function renderUserList() {
        if (!state.users.length) {
          dom.userList.className = "empty";
          dom.userList.textContent = "暂无账号";
          return;
        }

        const rows = state.users
          .map((user) => {
            const bind = user.participant_name ? `${user.participant_name} <${user.participant_email}>` : "-";
            return `<tr><td>${user.id}</td><td>${escapeHtml(user.username)}</td><td>${escapeHtml(user.role)}</td><td>${escapeHtml(bind)}</td></tr>`;
          })
          .join("");
        dom.userList.className = "";
        dom.userList.innerHTML = `<table><thead><tr><th>ID</th><th>用户名</th><th>角色</th><th>绑定参与者</th></tr></thead><tbody>${rows}</tbody></table>`;
      }

      function renderProjectUpdatePanel(project) {
        const editableGoals = [];
        project.phases.forEach((phase) => {
          phase.goals.forEach((goal) => {
            if (!goal.editable) return;
            editableGoals.push({ goal, phaseName: phase.name });
          });
        });

        if (!editableGoals.length) {
          return `<aside class="project-update">
            <h4>更新进度</h4>
            <div class="empty" style="padding: 12px;">你在该项目暂无可更新目标</div>
          </aside>`;
        }

        const defaultUpdatedBy = state.me ? state.me.username : "web_user";
        const optionsHtml = editableGoals
          .map((item, index) => `<option value="${item.goal.id}" ${index === 0 ? "selected" : ""}>${escapeHtml(item.phaseName)} / ${escapeHtml(item.goal.title)}</option>`)
          .join("");

        return `<aside class="project-update">
          <h4>更新进度</h4>
          <form class="project-update-form" data-project-id="${project.id}">
            <div class="field">
              <label>目标</label>
              <select name="goal_id" class="project-goal-select" required>${optionsHtml}</select>
            </div>
            <div class="two-col">
              <div class="field">
                <label>日期</label>
                <input name="date" type="date" value="${todayISO()}" required />
              </div>
              <div class="field">
                <label>更新人</label>
                <input name="updated_by" value="${escapeHtml(defaultUpdatedBy)}" required />
              </div>
            </div>
            <div class="two-col project-requirement-fields">
              <div class="field">
                <label>需求总数</label>
                <input name="requirement_total_count" type="number" min="0" step="1" />
              </div>
              <div class="field">
                <label>已完成需求数</label>
                <input name="requirement_done_count" type="number" min="0" step="1" />
              </div>
            </div>
            <div class="field project-percent-field hidden">
              <label>完成率 0-100</label>
              <input name="progress_percent" type="number" min="0" max="100" step="0.01" />
            </div>
            <div class="field project-remaining-di-field hidden">
              <label>剩余 DI</label>
              <input name="remaining_di" type="number" min="0" step="0.01" />
            </div>
            <div class="field">
              <label>项目进度状态</label>
              <select name="progress_state" required>
                <option value="normal">正常（蓝）</option>
                <option value="delayed">delay（红）</option>
                <option value="ahead">提前（绿）</option>
              </select>
            </div>
            <div class="field">
              <label>风险补充（可选）</label>
              <textarea name="risk_note" placeholder="例如：外部依赖未到位、资源冲突、环境阻塞"></textarea>
            </div>
            <div class="field">
              <label>备注（回退必填）</label>
              <textarea name="note"></textarea>
            </div>
            <p class="hint project-update-hint">加载中...</p>
            <button class="btn-primary" type="submit">提交该项目进度</button>
          </form>
        </aside>`;
      }

      function syncProjectUpdateForm(form) {
        if (!form) return;
        const goalSelect = form.querySelector(".project-goal-select");
        const hintEl = form.querySelector(".project-update-hint");
        const requirementWrap = form.querySelector(".project-requirement-fields");
        const percentField = form.querySelector(".project-percent-field");
        const remainingField = form.querySelector(".project-remaining-di-field");
        const submitBtn = form.querySelector("button[type='submit']");
        const progressStateEl = form.querySelector("select[name='progress_state']");

        const goalId = Number(goalSelect ? goalSelect.value : 0);
        const goal = state.goalMap.get(goalId);
        if (!goal) {
          if (hintEl) hintEl.textContent = "暂无可更新目标";
          if (submitBtn) submitBtn.disabled = true;
          return;
        }

        if (submitBtn) submitBtn.disabled = false;
        const isIssue = goal.goal_type === "issue";
        const isTask = goal.goal_type === "task";
        requirementWrap.classList.toggle("hidden", isIssue || isTask);
        percentField.classList.toggle("hidden", !isTask);
        remainingField.classList.toggle("hidden", !isIssue);

        const stateValue = normalizeProgressState(goal.progress_state);
        if (progressStateEl) {
          progressStateEl.value = stateValue;
        }
        const riskNoteInput = form.querySelector("textarea[name='risk_note']");
        if (riskNoteInput) {
          riskNoteInput.value = goal.risk_note || "";
        }

        if (isIssue) {
          const input = form.querySelector("input[name='remaining_di']");
          const currentRemaining = Number(goal.remaining_di ?? goal.issue_total_di ?? 0);
          const targetDi = Number(goal.issue_target_di ?? 0);
          const gapDi = currentRemaining - targetDi;
          if (input) {
            input.value = Number.isFinite(currentRemaining) ? currentRemaining.toFixed(2) : "0";
          }
          if (hintEl) hintEl.textContent = `问题单型目标：填写剩余 DI（目标DI ${targetDi.toFixed(2)}，差值 ${gapDi.toFixed(2)}）。`;
        } else if (isTask) {
          const input = form.querySelector("input[name='progress_percent']");
          const currentProgress = Number(goal.progress_percent || 0);
          if (input) {
            input.value = Number.isFinite(currentProgress) ? currentProgress.toFixed(2) : "0";
          }
          if (hintEl) hintEl.textContent = "事务型目标：手动填写完成率。";
        } else {
          const totalInput = form.querySelector("input[name='requirement_total_count']");
          const doneInput = form.querySelector("input[name='requirement_done_count']");
          if (totalInput) {
            totalInput.value = goal.requirement_total_count != null ? String(goal.requirement_total_count) : "";
          }
          if (doneInput) {
            doneInput.value = goal.requirement_done_count != null ? String(goal.requirement_done_count) : "";
          }
          if (hintEl) hintEl.textContent = "需求型目标：填写总需求数和已完成需求数。";
        }
      }

      function initProjectUpdateForms() {
        dom.dashboard.querySelectorAll(".project-update-form").forEach((form) => {
          syncProjectUpdateForm(form);
        });
      }

      function renderDashboard() {
        if (!state.projects.length) {
          dom.dashboard.innerHTML = '<div class="empty">暂无可见项目。管理员可先创建项目；负责人只会看到自己所属项目。</div>';
          return;
        }

        const html = state.projects
          .map((project) => {
            const projectProgress = Number(project.summary.progress_percent || 0);
            const phasesHtml = project.phases
              .map((phase) => {
                const phaseProgress = Number(phase.summary.progress_percent || 0);
                const goalsRows = phase.goals.length
                  ? phase.goals
                      .map((goal) => {
                        const stateClass = progressStateClass(goal.progress_state);
                        const stateLabel = progressStateLabel(goal.progress_state);
                        const noteBadge = goal.note
                          ? ` <span class="meta" title="${escapeHtml(goal.note)}">(备注)</span>`
                          : "";
                        const progressText = goalProgressText(goal);
                        const riskTip = goal.risk_note ? `；风险补充：${goal.risk_note}` : "";
                        return `<tr>
                      <td>${escapeHtml(goal.title)}${noteBadge}</td>
                      <td>${escapeHtml(goalTypeLabel(goal))}</td>
                      <td>${escapeHtml(goal.owner_name)}</td>
                      <td>
                        <div class="goal-progress-cell" title="${escapeHtml(`状态：${stateLabel}${riskTip}`)}">
                          <span class="chip ${stateClass}">${escapeHtml(stateLabel)}</span>
                          <span class="progress-text ${stateClass}">${escapeHtml(progressText)}</span>
                        </div>
                      </td>
                      <td>${Number(goal.weight).toFixed(2)}</td>
                      <td>${escapeHtml(goal.milestone_date)}</td>
                      <td>${escapeHtml(goal.deadline)}</td>
                    </tr>`;
                      })
                      .join("")
                  : '<tr><td colspan="7">暂无目标</td></tr>';

                return `<div class="phase-card">
                  <div class="phase-head title-line">
                    <h3>${escapeHtml(phase.name)}</h3>
                    <span class="chip ${chipClass(phaseProgress)}">${phaseProgress.toFixed(2)}%</span>
                  </div>
                  <p class="phase-objective">${escapeHtml(phase.objective)}</p>
                  <div class="progress-wrap"><div class="progress-bar" style="width:${Math.max(0, Math.min(100, phaseProgress))}%"></div></div>
                  <div class="meta">完成目标：${phase.summary.completed_goals}/${phase.summary.total_goals}</div>
                  <table>
                    <thead><tr><th>目标</th><th>类型</th><th>负责人</th><th>进度</th><th>权重</th><th>里程碑</th><th>截止</th></tr></thead>
                    <tbody>${goalsRows}</tbody>
                  </table>
                </div>`;
              })
              .join("");

            return `<article class="project-card">
              <div class="project-head">
                <div class="title-line">
                  <h3 class="project-name">#${project.id} ${escapeHtml(project.name)}</h3>
                  <span class="chip ${chipClass(projectProgress)}">${projectProgress.toFixed(2)}%</span>
                </div>
                <p class="meta">截止：${escapeHtml(project.deadline)} | 状态：${escapeHtml(project.status)} | 参与者：${project.participants.length}</p>
              </div>
              <div class="progress-wrap"><div class="progress-bar" style="width:${Math.max(0, Math.min(100, projectProgress))}%"></div></div>
              <div class="meta">目标完成：${project.summary.completed_goals}/${project.summary.total_goals}</div>
              <div class="project-shell">
                <div class="project-main-col">
                  <div class="phase-grid">${phasesHtml || '<div class="empty">暂无阶段</div>'}</div>
                  ${renderGantt(project)}
                </div>
                ${renderProjectUpdatePanel(project)}
              </div>
            </article>`;
          })
          .join("");

        dom.dashboard.innerHTML = html;
        initProjectUpdateForms();
      }

      function rebuildIndexes() {
        state.projectMap = new Map();
        state.phaseMap = new Map();
        state.goalMap = new Map();

        state.projects.forEach((project) => {
          state.projectMap.set(project.id, project);
          project.phases.forEach((phase) => {
            state.phaseMap.set(phase.id, { ...phase, projectId: project.id, participants: project.participants });
            phase.goals.forEach((goal) => {
              state.goalMap.set(goal.id, { ...goal, phaseId: phase.id, projectId: project.id });
            });
          });
        });
      }

      function syncGoalOwnersByPhase() {
        const phase = state.phaseMap.get(Number(dom.goalPhaseId.value || 0));
        const options = (phase?.participants || []).map((p) => ({
          value: p.id,
          label: `${p.name} <${p.email}>`,
        }));
        upsertSelectOptions(dom.goalOwnerId, options);
      }

      function syncGoalTypeFields() {
        const isIssue = dom.goalType.value === "issue";
        const isTask = dom.goalType.value === "task";
        dom.goalIssueFields.classList.toggle("hidden", !isIssue);
        dom.goalRequirementPriorityField.classList.toggle("hidden", isIssue || isTask);

        if (isIssue) {
          if (!dom.goalIssueTotalDi.value) {
            dom.goalIssueTotalDi.value = "1";
          }
          if (!dom.goalIssueTargetDi.value) {
            dom.goalIssueTargetDi.value = "0";
          }
          if (!dom.goalWeight.value) {
            dom.goalWeight.value = "1";
          }
        } else if (isTask) {
          if (!dom.goalWeight.value) {
            dom.goalWeight.value = "1";
          }
        } else {
          const priority = dom.goalRequirementPriority.value;
          dom.goalWeight.value = String(defaultWeightForPriority(priority));
        }
      }

      function participantsToTextarea(participants) {
        return (participants || [])
          .map((item) => `${item.name},${item.email}`)
          .join("\n");
      }

      function syncProjectEditForm() {
        const options = state.projects.map((project) => ({
          value: project.id,
          label: `#${project.id} ${project.name}`,
        }));
        upsertSelectOptions(dom.projectEditId, options);

        const project = state.projectMap.get(Number(dom.projectEditId.value || 0));
        if (!project) {
          dom.projectEditName.value = "";
          dom.projectEditDeadline.value = "";
          dom.projectEditParticipants.value = "";
          return;
        }
        dom.projectEditName.value = project.name || "";
        dom.projectEditDeadline.value = project.deadline || "";
        dom.projectEditParticipants.value = participantsToTextarea(project.participants);
      }

      function syncPhaseEditForm() {
        const options = [];
        state.projects.forEach((project) => {
          project.phases.forEach((phase) => {
            options.push({
              value: phase.id,
              label: `${project.name} / ${phase.name}`,
            });
          });
        });
        upsertSelectOptions(dom.phaseEditId, options);

        const phase = state.phaseMap.get(Number(dom.phaseEditId.value || 0));
        if (!phase) {
          dom.phaseEditName.value = "";
          dom.phaseEditObjective.value = "";
          dom.phaseEditOrder.value = "";
          return;
        }
        dom.phaseEditName.value = phase.name || "";
        dom.phaseEditObjective.value = phase.objective || "";
        dom.phaseEditOrder.value = String(phase.order_index || "");
      }

      function syncGoalEditTypeFields() {
        const isIssue = dom.goalEditType.value === "issue";
        const isTask = dom.goalEditType.value === "task";
        dom.goalEditIssueFields.classList.toggle("hidden", !isIssue);
        dom.goalEditRequirementPriorityField.classList.toggle("hidden", isIssue || isTask);
        if (isIssue) {
          if (!dom.goalEditIssueTargetDi.value) {
            dom.goalEditIssueTargetDi.value = "0";
          }
          if (!dom.goalEditWeight.value) {
            dom.goalEditWeight.value = "1";
          }
        } else if (isTask) {
          if (!dom.goalEditWeight.value) {
            dom.goalEditWeight.value = "1";
          }
        } else {
          if (!dom.goalEditWeight.value) {
            dom.goalEditWeight.value = String(defaultWeightForPriority(dom.goalEditRequirementPriority.value));
          }
        }
      }

      function syncGoalEditOwnersByGoal() {
        const goal = state.goalMap.get(Number(dom.goalEditId.value || 0));
        const project = goal ? state.projectMap.get(goal.projectId) : null;
        const options = (project?.participants || []).map((p) => ({
          value: p.id,
          label: `${p.name} <${p.email}>`,
        }));
        upsertSelectOptions(dom.goalEditOwnerId, options, goal ? String(goal.owner_participant_id) : "");
      }

      function syncGoalEditForm() {
        const options = [];
        state.projects.forEach((project) => {
          project.phases.forEach((phase) => {
            phase.goals.forEach((goal) => {
              options.push({
                value: goal.id,
                label: `${project.name} / ${phase.name} / ${goal.title}`,
              });
            });
          });
        });
        upsertSelectOptions(dom.goalEditId, options);

        const goal = state.goalMap.get(Number(dom.goalEditId.value || 0));
        syncGoalEditOwnersByGoal();
        if (!goal) {
          dom.goalEditTitle.value = "";
          dom.goalEditNote.value = "";
          dom.goalEditType.value = "requirement";
          dom.goalEditRequirementPriority.value = "";
          dom.goalEditIssueModule.value = "";
          dom.goalEditIssueTotalDi.value = "";
          dom.goalEditIssueTargetDi.value = "0";
          dom.goalEditMilestoneDate.value = "";
          dom.goalEditDeadline.value = "";
          dom.goalEditWeight.value = "1";
          syncGoalEditTypeFields();
          return;
        }

        dom.goalEditTitle.value = goal.title || "";
        dom.goalEditNote.value = goal.note || "";
        dom.goalEditType.value = goal.goal_type || "requirement";
        dom.goalEditRequirementPriority.value = goal.requirement_priority ? String(goal.requirement_priority) : "";
        dom.goalEditIssueModule.value = goal.issue_module || "";
        dom.goalEditIssueTotalDi.value = goal.issue_total_di != null ? String(goal.issue_total_di) : "";
        dom.goalEditIssueTargetDi.value = goal.issue_target_di != null ? String(goal.issue_target_di) : "0";
        dom.goalEditMilestoneDate.value = goal.milestone_date || "";
        dom.goalEditDeadline.value = goal.deadline || "";
        dom.goalEditWeight.value = goal.weight != null ? String(goal.weight) : "1";
        syncGoalEditTypeFields();
      }

      function syncProgressInputMode() {
        const goal = state.goalMap.get(Number(dom.progressGoalId.value || 0));
        const isIssue = goal && goal.goal_type === "issue";
        const isTask = goal && goal.goal_type === "task";

        dom.progressRequirementFields.classList.toggle("hidden", !!isIssue || !!isTask);
        dom.progressPercentField.classList.toggle("hidden", !isTask);
        dom.progressRemainingDiField.classList.toggle("hidden", !isIssue);

        if (isIssue) {
          const currentRemaining = Number(goal.remaining_di ?? goal.issue_total_di ?? 0);
          const targetDi = Number(goal.issue_target_di ?? 0);
          const gapDi = currentRemaining - targetDi;
          dom.progressRemainingDi.value = Number.isFinite(currentRemaining) ? currentRemaining.toFixed(2) : "0";
          dom.progressInputHint.textContent = `问题单型目标：按剩余DI-目标DI跟踪（当前剩余 ${dom.progressRemainingDi.value}，目标DI ${targetDi.toFixed(2)}，差值 ${gapDi.toFixed(2)}）`;
        } else if (isTask) {
          const currentProgress = Number(goal ? goal.progress_percent : 0);
          dom.progressValue.value = Number.isFinite(currentProgress) ? currentProgress.toFixed(2) : "0";
          dom.progressInputHint.textContent = "事务型目标：直接填写完成率百分比。";
        } else {
          const currentProgress = Number(goal ? goal.progress_percent : 0);
          dom.progressValue.value = Number.isFinite(currentProgress) ? currentProgress.toFixed(2) : "0";
          dom.progressRequirementTotal.value = goal && goal.requirement_total_count != null
            ? String(goal.requirement_total_count)
            : "";
          dom.progressRequirementDone.value = goal && goal.requirement_done_count != null
            ? String(goal.requirement_done_count)
            : "";
          dom.progressInputHint.textContent = "需求型目标：录入需求总数与已完成需求数，自动计算进度。";
        }
      }

      function syncProgressGoalsByProject() {
        const project = state.projectMap.get(Number(dom.progressProjectId.value || 0));
        const options = [];
        (project?.phases || []).forEach((phase) => {
          phase.goals
            .filter((goal) => goal.editable)
            .forEach((goal) => {
              const progressText = goalProgressText(goal);
              options.push({
                value: goal.id,
                label: `${phase.name} / ${goal.title} (${progressText})`,
              });
            });
        });
        upsertSelectOptions(dom.progressGoalId, options);
        syncProgressInputMode();
      }

      function refreshSelectors() {
        const projectOpts = state.projects.map((p) => ({ value: p.id, label: `#${p.id} ${p.name}` }));
        upsertSelectOptions(dom.phaseProjectId, projectOpts);
        upsertSelectOptions(dom.progressProjectId, projectOpts);

        const phaseOpts = [];
        state.projects.forEach((project) => {
          project.phases.forEach((phase) => {
            phaseOpts.push({ value: phase.id, label: `${project.name} / ${phase.name}` });
          });
        });
        upsertSelectOptions(dom.goalPhaseId, phaseOpts);

        syncProjectEditForm();
        syncGoalOwnersByPhase();
        syncGoalTypeFields();
        syncPhaseEditForm();
        syncGoalEditForm();
        syncProgressGoalsByProject();
      }

      function refreshParticipantOptionsForUserCreation() {
        const options = state.participantOptions.map((item) => ({
          value: item.id,
          label: `#${item.id} [项目${item.project_id}] ${item.name} <${item.email}>`,
        }));
        upsertSelectOptions(dom.newParticipantId, options);
      }

      function findDispatchPreference(period) {
        return state.reportDispatchMap.get(period) || null;
      }

      function syncDispatchForm() {
        const period = dom.dispatchPeriod.value;
        const pref = findDispatchPreference(period);
        if (!pref) {
          dom.dispatchSendTime.value = "18:00";
          dom.dispatchRecipients.value = "";
          dom.dispatchEnabled.checked = false;
          dom.dispatchSummary.textContent = "当前周期尚无配置。";
          return;
        }
        dom.dispatchSendTime.value = pref.send_time || "18:00";
        dom.dispatchRecipients.value = emailsToTextarea(pref.recipients || []);
        dom.dispatchEnabled.checked = !!pref.enabled;
        const statusText = pref.last_status ? `上次状态: ${pref.last_status}` : "尚无执行记录";
        const dateText = pref.last_scheduled_date ? `上次执行日: ${pref.last_scheduled_date}` : "未执行";
        const skipText = pref.skip_once_date ? `跳过日: ${pref.skip_once_date}` : "无跳过";
        dom.dispatchSummary.textContent = `${reportPeriodLabel(period)} | ${dateText} | ${statusText} | ${skipText}`;
      }

      async function loadReportDispatchPreferences() {
        if (!state.me || state.me.role !== "admin") return;
        const data = await requestJson("/api/report-dispatch/preferences");
        const prefs = data.preferences || [];
        state.reportDispatchMap = new Map(prefs.map((item) => [item.period, item]));
        syncDispatchForm();
      }

      async function handleReportPreview(event) {
        event.preventDefault();
        try {
          clearReportRenderTimer();
          const period = dom.reportPeriod.value;
          const runDate = dom.reportDate.value;
          const data = await requestJson(`/api/reports/preview?period=${period}&date=${runDate}`);
          dom.reportSubject.value = data.subject || "";
          dom.reportMarkdown.value = data.markdown || "";
          setReportPreviewHtml(data.html || "");
          state.reportRenderRequestSeq += 1;
          const scheduledRecipients = data.scheduled && data.scheduled.recipients ? data.scheduled.recipients : [];
          const recipients = scheduledRecipients.length ? scheduledRecipients : (data.default_recipients || []);
          dom.reportRecipients.value = emailsToTextarea(recipients);
          showStatus(`${reportPeriodLabel(period)}预览已加载`, "ok");
        } catch (err) {
          showStatus(err.message, "error");
        }
      }

      async function renderReportPreview({ silent = false } = {}) {
        const currentMarkdown = dom.reportMarkdown.value || "";
        const currentSubject = dom.reportSubject.value || "报表预览";
        const requestSeq = ++state.reportRenderRequestSeq;
        try {
          const data = await requestJson("/api/reports/render-html", {
            method: "POST",
            body: JSON.stringify({
              markdown: currentMarkdown,
              subject: currentSubject,
            }),
          });
          if (requestSeq !== state.reportRenderRequestSeq) return;
          setReportPreviewHtml(data.html || "");
          if (!silent) {
            showStatus("图表预览已刷新", "ok");
          }
        } catch (err) {
          if (requestSeq !== state.reportRenderRequestSeq) return;
          showStatus(err.message, "error");
        }
      }

      function scheduleReportRenderPreview() {
        clearReportRenderTimer();
        state.reportRenderTimer = setTimeout(() => {
          state.reportRenderTimer = null;
          renderReportPreview({ silent: true });
        }, 450);
      }

      async function handleReportRenderPreview() {
        clearReportRenderTimer();

      function buildProgressPayload(goal, values) {
        if (!goal) {
          throw new Error("请选择可更新目标");
        }

        const note = (values.note || "").trim();
        const riskNote = (values.risk_note || "").trim();
        const progressState = normalizeProgressState(values.progress_state || "normal");

        let progressPercent = null;
        let remainingDi = null;
        let requirementTotalCount = null;
        let requirementDoneCount = null;

        if (goal.goal_type === "issue") {
          remainingDi = Number(values.remaining_di);
          const latestRemaining = Number(goal.remaining_di ?? goal.issue_total_di ?? 0);
          if (Number.isNaN(remainingDi) || remainingDi < 0) {
            throw new Error("剩余 DI 不能小于 0");
          }
          if (remainingDi > latestRemaining && !note) {
            throw new Error("剩余 DI 增加时必须填写备注");
          }
        } else if (goal.goal_type === "task") {
          progressPercent = Number(values.progress_percent);
          if (Number.isNaN(progressPercent) || progressPercent < 0 || progressPercent > 100) {
            throw new Error("事务型目标完成率必须在 0-100");
          }
          if (progressPercent < Number(goal.progress_percent || 0) && !note) {
            throw new Error("回退进度必须填写备注");
          }
        } else {
          const totalRaw = String(values.requirement_total_count || "").trim();
          const doneRaw = String(values.requirement_done_count || "").trim();
          if (totalRaw === "" || doneRaw === "") {
            throw new Error("需求型目标请填写总需求数和已完成需求数");
          }
          requirementTotalCount = Number(totalRaw);
          requirementDoneCount = Number(doneRaw);

          if (Number.isNaN(requirementTotalCount) || requirementTotalCount < 0 || !Number.isInteger(requirementTotalCount)) {
            throw new Error("需求总数必须为大于等于 0 的整数");
          }
          if (Number.isNaN(requirementDoneCount) || requirementDoneCount < 0 || !Number.isInteger(requirementDoneCount)) {
            throw new Error("已完成需求数必须为大于等于 0 的整数");
          }
          if (requirementDoneCount > requirementTotalCount) {
            throw new Error("已完成需求数不能大于总需求数");
          }

          const computedProgress = requirementTotalCount === 0 ? 0 : (requirementDoneCount * 100 / requirementTotalCount);
          if (computedProgress < Number(goal.progress_percent || 0) && !note) {
            throw new Error("回退进度必须填写备注");
          }
        }

        return {
          progress_percent: progressPercent,
          remaining_di: remainingDi,
          requirement_total_count: requirementTotalCount,
          requirement_done_count: requirementDoneCount,
          progress_state: progressState,
          risk_note: riskNote || null,
          note: note || null,
        };
      }

      async function handleProjectCardProgress(event) {
        const form = event.target.closest(".project-update-form");
        if (!form) return;
        event.preventDefault();
        try {
          const goalId = Number(form.querySelector("select[name='goal_id']").value);
          const goal = state.goalMap.get(goalId);
          const payload = buildProgressPayload(goal, {
            progress_percent: form.querySelector("input[name='progress_percent']").value,
            remaining_di: form.querySelector("input[name='remaining_di']").value,
            requirement_total_count: form.querySelector("input[name='requirement_total_count']").value,
            requirement_done_count: form.querySelector("input[name='requirement_done_count']").value,
            progress_state: form.querySelector("select[name='progress_state']").value,
            risk_note: form.querySelector("textarea[name='risk_note']").value,
            note: form.querySelector("textarea[name='note']").value,
          });

          await requestJson("/api/progress", {
            method: "POST",
            body: JSON.stringify({
              goal_id: goalId,
              date: form.querySelector("input[name='date']").value,
              updated_by: form.querySelector("input[name='updated_by']").value.trim() || "web_user",
              ...payload,
            }),
          });

          form.querySelector("textarea[name='note']").value = "";
          await refreshAll(true);
          showStatus("项目进度更新成功", "ok");
        } catch (err) {
          showStatus(err.message, "error");
          showProgressErrorDialog(err.message);
        }
      }

      function handleDashboardFormChange(event) {
        if (!event.target.matches(".project-goal-select")) return;
        const form = event.target.closest(".project-update-form");
        if (!form) return;
        syncProjectUpdateForm(form);
      }

      async function handleProgress(event) {
        event.preventDefault();
        try {
          const goalId = Number(dom.progressGoalId.value);
          const goal = state.goalMap.get(goalId);
          const payload = buildProgressPayload(goal, {
            progress_percent: dom.progressValue.value,
            remaining_di: dom.progressRemainingDi.value,
            requirement_total_count: dom.progressRequirementTotal.value,
            requirement_done_count: dom.progressRequirementDone.value,
            progress_state: goal ? goal.progress_state : "normal",
            risk_note: goal ? (goal.risk_note || "") : "",
            note: dom.progressNote.value,
          });

          await requestJson("/api/progress", {
            method: "POST",
            body: JSON.stringify({
              goal_id: goalId,
              date: dom.progressDate.value,
              updated_by: dom.progressUpdatedBy.value.trim(),
              ...payload,
            }),
          });

          dom.progressNote.value = "";
          dom.progressRemainingDi.value = "";
          dom.progressRequirementTotal.value = "";
          dom.progressRequirementDone.value = "";
          await refreshAll(true);
          showStatus("进度更新成功", "ok");
        } catch (err) {
          showStatus(err.message, "error");
          showProgressErrorDialog(err.message);
        }
      }

      function toggleParticipantField() {
        const isOwner = dom.newRole.value === "owner";
        dom.participantField.classList.toggle("hidden", !isOwner);
      }

      function initDefaults() {
        applyTheme(resolveInitialTheme());
        state.activeMainTab = "dashboard";
        state.activeOpsTab = "project";
        applyReportEditorSplit(state.reportEditorSplit, { persist: false });
        dom.projectDeadline.value = todayISO();
        dom.goalType.value = "requirement";
        dom.goalRequirementPriority.value = "";
        dom.goalIssueModule.value = "";
        dom.goalIssueTotalDi.value = "";
        dom.goalIssueTargetDi.value = "0";
        dom.goalNote.value = "";
        dom.goalEditType.value = "requirement";
        dom.goalEditRequirementPriority.value = "";
        dom.goalEditIssueModule.value = "";
        dom.goalEditIssueTotalDi.value = "";
        dom.goalEditIssueTargetDi.value = "0";
        dom.goalEditNote.value = "";
        dom.goalMilestoneDate.value = todayISO();
        dom.goalDeadline.value = todayISO();
        dom.progressDate.value = todayISO();
        dom.progressRequirementTotal.value = "";
        dom.progressRequirementDone.value = "";
        dom.progressUpdatedBy.value = "web_user";
        dom.reportPeriod.value = "daily";
        dom.reportDate.value = todayISO();
        dom.reportSubject.value = "";
        dom.reportRecipients.value = "";
        dom.reportMarkdown.value = "";
        clearReportRenderTimer();
        setReportPreviewHtml("");
        state.reportRenderRequestSeq = 0;
        dom.reportSkipToday.checked = false;
        dom.dispatchPeriod.value = "daily";
        dom.dispatchSendTime.value = "18:00";
        dom.dispatchRecipients.value = "";
        dom.dispatchEnabled.checked = false;
        dom.dispatchSummary.textContent = "尚未加载配置。";
        dom.smtpHost.value = "";
        dom.smtpPort.value = "587";
        dom.smtpUser.value = "";
        dom.smtpPass.value = "";
        dom.smtpMailFrom.value = "";
        dom.smtpSummary.textContent = "尚未加载 SMTP 配置。";
        dom.newRole.value = "owner";
        toggleParticipantField();
        syncGoalTypeFields();
        syncGoalEditTypeFields();
        setMainTab("dashboard");
        setOpsTab("project");
      }

      function bindEvents() {
        dom.themeToggle.addEventListener("click", toggleTheme);
        dom.refreshNow.addEventListener("click", () => refreshAll(false));
        dom.logoutBtn.addEventListener("click", handleLogout);

        dom.bootstrapForm.addEventListener("submit", handleBootstrap);
        dom.loginForm.addEventListener("submit", handleLogin);
        dom.createUserForm.addEventListener("submit", handleCreateUser);

        dom.projectForm.addEventListener("submit", handleCreateProject);
        dom.projectEditForm.addEventListener("submit", handleUpdateProject);
        dom.phaseForm.addEventListener("submit", handleCreatePhase);
        dom.goalForm.addEventListener("submit", handleCreateGoal);
        dom.phaseEditForm.addEventListener("submit", handleUpdatePhase);
        dom.goalEditForm.addEventListener("submit", handleUpdateGoal);
        dom.progressForm.addEventListener("submit", handleProgress);
        dom.dashboard.addEventListener("submit", handleProjectCardProgress);
        dom.dashboard.addEventListener("change", handleDashboardFormChange);
        dom.reportPreviewForm.addEventListener("submit", handleReportPreview);
        dom.reportEditorDivider.addEventListener("pointerdown", handleReportEditorDividerPointerDown);
        dom.reportRenderBtn.addEventListener("click", handleReportRenderPreview);
        dom.reportMarkdown.addEventListener("input", scheduleReportRenderPreview);
        dom.reportDispatchForm.addEventListener("submit", handleReportDispatchSave);
        dom.smtpConfigForm.addEventListener("submit", handleSmtpConfigSave);
        dom.reportExportDocxBtn.addEventListener("click", handleReportExportDocx);
        dom.reportExportOutlookBtn.addEventListener("click", handleReportExportOutlook);
        dom.reportSendNowBtn.addEventListener("click", handleReportSendNow);
        dom.phaseDeleteBtn.addEventListener("click", handleDeletePhase);
        dom.goalDeleteBtn.addEventListener("click", handleDeleteGoal);

        dom.goalPhaseId.addEventListener("change", syncGoalOwnersByPhase);
        dom.goalType.addEventListener("change", syncGoalTypeFields);
        dom.goalRequirementPriority.addEventListener("change", syncGoalTypeFields);
        dom.progressProjectId.addEventListener("change", syncProgressGoalsByProject);
        dom.progressGoalId.addEventListener("change", syncProgressInputMode);
        dom.newRole.addEventListener("change", toggleParticipantField);
        dom.projectEditId.addEventListener("change", syncProjectEditForm);
        dom.phaseEditId.addEventListener("change", syncPhaseEditForm);
        dom.goalEditId.addEventListener("change", syncGoalEditForm);
        dom.goalEditType.addEventListener("change", syncGoalEditTypeFields);
        dom.goalEditRequirementPriority.addEventListener("change", syncGoalEditTypeFields);
        dom.dispatchPeriod.addEventListener("change", syncDispatchForm);
        dom.tabDashboardBtn.addEventListener("click", () => setMainTab("dashboard"));
        dom.tabReportsBtn.addEventListener("click", () => setMainTab("reports"));
        dom.tabSmtpBtn.addEventListener("click", () => setMainTab("smtp"));
        dom.tabOpsBtn.addEventListener("click", () => setMainTab("ops"));
        dom.tabAdminBtn.addEventListener("click", () => setMainTab("admin"));
        dom.opsProjectBtn.addEventListener("click", () => setOpsTab("project"));
        dom.opsProjectEditBtn.addEventListener("click", () => setOpsTab("project-edit"));
        dom.opsPhaseBtn.addEventListener("click", () => setOpsTab("phase"));
        dom.opsGoalBtn.addEventListener("click", () => setOpsTab("goal"));
        dom.opsPhaseEditBtn.addEventListener("click", () => setOpsTab("phase-edit"));
        dom.opsGoalEditBtn.addEventListener("click", () => setOpsTab("goal-edit"));
      }

      async function boot() {
        initDefaults();
        bindEvents();

        await setupAuthPanel();
        const loggedIn = await loadMeFromToken();
        if (loggedIn) {
          dom.authPanel.classList.add("hidden");
          updateAuthUi();
          await refreshAll(false);
        } else {
          updateAuthUi();
        }

        setInterval(async () => {
          if (!state.me) return;
          try {
            await refreshAll(true);
          } catch (err) {
            showStatus(err.message, "error");
          }
        }, POLL_MS);
      }

      boot().catch((err) => {
        showStatus(err.message || "初始化失败", "error");
      });
    </script>
  </body>
</html>
