<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>项目排程与进度管理</title>
    <style>
      :root {
        --bg: #f6f9f6;
        --panel: #ffffff;
        --panel-soft: #f6fbf8;
        --text: #14281e;
        --muted: #60766a;
        --line: #d4e1d9;
        --shadow: 0 14px 30px rgba(20, 40, 30, 0.08);
        --brand: #0f766e;
        --brand-deep: #115e59;
        --good: #166534;
        --warn: #b45309;
        --bad: #b91c1c;
      }

      * { box-sizing: border-box; }

      body {
        margin: 0;
        font-family: "Avenir Next", "Segoe UI", "Noto Sans SC", sans-serif;
        background: radial-gradient(circle at 85% 0%, #d8f3e8 0%, transparent 34%),
          radial-gradient(circle at 4% 25%, #ddebfa 0%, transparent 30%), var(--bg);
        color: var(--text);
        transition: background 0.2s ease, color 0.2s ease;
      }

      body.theme-dark {
        --bg: #0f1115;
        --panel: #181b20;
        --panel-soft: #21252c;
        --text: #e5e7eb;
        --muted: #9ca3af;
        --line: #323843;
        --shadow: 0 16px 34px rgba(0, 0, 0, 0.35);
        --brand: #0d9488;
        --brand-deep: #0f766e;
        --good: #22c55e;
        --warn: #f59e0b;
        --bad: #ef4444;
        background: radial-gradient(circle at 88% 0%, #1f2937 0%, transparent 38%),
          radial-gradient(circle at 10% 20%, #111827 0%, transparent 35%), var(--bg);
      }

      .container {
        max-width: 1360px;
        margin: 0 auto;
        padding: 20px 16px 40px;
      }

      .top {
        display: flex;
        justify-content: space-between;
        gap: 12px;
        align-items: flex-end;
        margin-bottom: 14px;
      }

      .title {
        margin: 0;
        font-size: 28px;
      }

      .subtitle {
        margin: 5px 0 0;
        color: var(--muted);
        font-size: 14px;
      }

      .auth-bar {
        display: flex;
        gap: 8px;
        align-items: center;
      }

      .badge {
        border: 1px solid #cfe0d5;
        background: #f2f8f4;
        border-radius: 999px;
        font-size: 12px;
        color: #355246;
        padding: 6px 12px;
      }

      .status {
        min-height: 36px;
        border: 1px solid #d9e5de;
        background: #f4f8f5;
        color: #4f655a;
        border-radius: 999px;
        padding: 0 13px;
        display: inline-flex;
        align-items: center;
        font-size: 13px;
      }

      .status.ok { color: var(--good); border-color: #b6dfc4; background: #edf9f1; }
      .status.warn { color: var(--warn); border-color: #efd6b2; background: #fff8ef; }
      .status.error { color: var(--bad); border-color: #f0c3c3; background: #fff2f2; }

      button {
        border: 0;
        border-radius: 10px;
        cursor: pointer;
        font-size: 13px;
        font-weight: 600;
        padding: 9px 12px;
      }

      .btn-primary { color: #fff; background: linear-gradient(135deg, var(--brand), var(--brand-deep)); }
      .btn-secondary { color: #1c4d40; background: #d9eee6; }
      .btn-danger { color: #fff; background: #b91c1c; }

      body.theme-dark .badge {
        border-color: #3c4450;
        background: #1f242b;
        color: #d1d5db;
      }

      body.theme-dark .status {
        border-color: #3c4450;
        background: #1b2027;
        color: #d1d5db;
      }

      body.theme-dark .status.ok {
        color: #86efac;
        border-color: #2e5c42;
        background: #13281c;
      }

      body.theme-dark .status.warn {
        color: #fcd34d;
        border-color: #5c4925;
        background: #2a2418;
      }

      body.theme-dark .status.error {
        color: #fca5a5;
        border-color: #5c2c2c;
        background: #2b1717;
      }

      body.theme-dark .btn-secondary {
        color: #e5e7eb;
        background: #313843;
      }

      .layout {
        display: grid;
        grid-template-columns: repeat(12, minmax(0, 1fr));
        gap: 14px;
      }

      .panel {
        background: var(--panel);
        border: 1px solid var(--line);
        border-radius: 16px;
        box-shadow: var(--shadow);
        padding: 14px;
      }

      .panel h2 { margin: 0 0 10px; font-size: 17px; }
      .panel h3 { margin: 0; font-size: 15px; }

      .auth-panel { grid-column: span 12; }
      .main-tabs { grid-column: span 12; }
      .tab-page { grid-column: span 12; display: grid; gap: 14px; }
      .admin-users { grid-column: span 4; }
      .project { grid-column: span 4; }
      .phase { grid-column: span 4; }
      .goal { grid-column: span 4; }
      .phase-edit { grid-column: span 6; }
      .goal-edit { grid-column: span 6; }
      .progress { grid-column: span 12; }
      .dashboard { grid-column: span 12; }
      .ops { grid-column: span 12; }

      .hidden { display: none !important; }

      .tab-buttons {
        display: flex;
        flex-wrap: wrap;
        gap: 8px;
      }

      .tab-btn {
        border: 1px solid var(--line);
        background: var(--panel-soft);
        color: var(--muted);
      }

      .tab-btn.active {
        color: #fff;
        border-color: transparent;
        background: linear-gradient(135deg, var(--brand), var(--brand-deep));
      }

      .sub-tab-page {
        margin-top: 12px;
      }

      .field { display: grid; gap: 5px; margin-bottom: 10px; }
      .field label { font-size: 12px; color: var(--muted); }

      input, select, textarea {
        width: 100%;
        border: 1px solid #ccddd3;
        border-radius: 10px;
        padding: 9px 10px;
        font-size: 14px;
        color: var(--text);
        background: var(--panel-soft);
      }

      textarea { min-height: 82px; resize: vertical; }

      .two-col { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }

      .hint {
        margin: 2px 0 10px;
        font-size: 12px;
        color: var(--muted);
      }

      .project-grid { display: grid; gap: 12px; }

      .project-card {
        border: 1px solid #d8e5de;
        border-radius: 14px;
        background: #fbfefc;
        padding: 12px;
      }

      .project-head {
        display: flex;
        justify-content: space-between;
        gap: 12px;
        align-items: flex-start;
      }

      .project-name { margin: 0; font-size: 18px; }
      .meta { margin: 2px 0 0; color: var(--muted); font-size: 12px; }

      .progress-wrap {
        margin-top: 8px;
        height: 11px;
        border-radius: 999px;
        background: #eaf3ee;
        overflow: hidden;
      }

      .progress-bar { height: 100%; background: linear-gradient(90deg, #1e9b5e, #1b7a4b); }

      .chip {
        border-radius: 999px;
        font-size: 12px;
        font-weight: 700;
        padding: 2px 9px;
        display: inline-flex;
        align-items: center;
      }

      .chip.good { color: #146a32; background: #e6f7eb; }
      .chip.warn { color: #9a5800; background: #fff2df; }
      .chip.bad { color: #a81616; background: #ffe6e6; }
      .chip.risk-green { color: #146a32; background: #e6f7eb; }
      .chip.risk-yellow { color: #9a5800; background: #fff2df; }
      .chip.risk-red { color: #a81616; background: #ffe6e6; }

      .phase-grid { display: grid; gap: 10px; margin-top: 10px; }
      .phase-card {
        border: 1px solid #dbe8e2;
        border-radius: 12px;
        background: #f8fcfa;
        padding: 10px;
      }

      .phase-head {
        display: flex;
        justify-content: space-between;
        align-items: baseline;
      }

      .phase-objective { margin: 4px 0 8px; font-size: 13px; color: var(--muted); }

      table { width: 100%; border-collapse: collapse; font-size: 12px; }
      th, td {
        text-align: left;
        padding: 6px 5px;
        border-bottom: 1px solid #dbe6e0;
        vertical-align: top;
      }
      th { color: #4a6156; }

      .empty {
        border: 1px dashed #c8d8cf;
        border-radius: 12px;
        background: #f8fcfa;
        color: var(--muted);
        text-align: center;
        padding: 20px;
      }

      .gantt {
        margin-top: 10px;
        border: 1px solid #d8e5de;
        border-radius: 12px;
        background: #f8fcfa;
        padding: 10px;
      }

      .gantt-title {
        margin: 0 0 8px;
        font-size: 13px;
        color: #3b5549;
      }

      .gantt-row {
        display: grid;
        grid-template-columns: 180px 1fr;
        gap: 8px;
        align-items: center;
        margin-bottom: 8px;
      }

      .gantt-label {
        font-size: 12px;
        color: #425a4f;
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
      }

      .gantt-track {
        position: relative;
        height: 22px;
        border-radius: 999px;
        background: repeating-linear-gradient(
          90deg,
          #ebf2ee,
          #ebf2ee 10%,
          #f4f8f5 10%,
          #f4f8f5 20%
        );
        overflow: hidden;
      }

      body.theme-dark .project-card {
        border-color: #3b424d;
        background: #1b1f26;
      }

      body.theme-dark .phase-card {
        border-color: #3b424d;
        background: #1f242c;
      }

      body.theme-dark .progress-wrap {
        background: #323845;
      }

      body.theme-dark th,
      body.theme-dark td {
        border-bottom-color: #3a414d;
      }

      body.theme-dark th {
        color: #cbd5e1;
      }

      body.theme-dark .empty {
        border-color: #3b424d;
        background: #1f242c;
      }

      body.theme-dark .gantt {
        border-color: #3b424d;
        background: #1f242c;
      }

      body.theme-dark .gantt-track {
        background: repeating-linear-gradient(
          90deg,
          #2c3340,
          #2c3340 10%,
          #252b35 10%,
          #252b35 20%
        );
      }

      .gantt-bar {
        position: absolute;
        top: 3px;
        bottom: 3px;
        border-radius: 999px;
        background: linear-gradient(90deg, #0f766e, #0ea5a0);
      }

      .gantt-fill {
        position: absolute;
        left: 0;
        top: 0;
        bottom: 0;
        border-radius: 999px;
        background: rgba(21, 128, 61, 0.95);
      }

      .gantt-meta {
        margin-top: 4px;
        color: var(--muted);
        font-size: 12px;
      }

      @media (max-width: 1160px) {
        .admin-users, .project, .phase, .goal, .phase-edit, .goal-edit { grid-column: span 12; }
      }

      @media (max-width: 760px) {
        .top { flex-direction: column; align-items: flex-start; }
        .two-col { grid-template-columns: 1fr; }
        .gantt-row { grid-template-columns: 1fr; }
      }
    </style>
  </head>
  <body>
    <div class="container">
      <header class="top">
        <div>
          <h1 class="title">项目排程与进度管理平台</h1>
          <p class="subtitle">支持管理员/负责人登录权限，实时看板与甘特图时间轴。</p>
        </div>
        <div class="auth-bar">
          <div id="currentUser" class="badge">未登录</div>
          <button id="themeToggle" class="btn-secondary" type="button">夜间模式</button>
          <button id="refreshNow" class="btn-secondary hidden" type="button">立即刷新</button>
          <button id="logoutBtn" class="btn-danger hidden" type="button">登出</button>
        </div>
      </header>

      <div id="statusBar" class="status">等待初始化...</div>

      <main class="layout" style="margin-top: 12px;">
        <section class="panel auth-panel" id="authPanel">
          <h2>账户认证</h2>

          <form id="bootstrapForm" class="hidden">
            <p class="hint">系统尚未初始化账号。请先创建第一个管理员。</p>
            <div class="two-col">
              <div class="field">
                <label for="bootstrapUsername">管理员用户名</label>
                <input id="bootstrapUsername" required />
              </div>
              <div class="field">
                <label for="bootstrapPassword">管理员密码</label>
                <input id="bootstrapPassword" type="password" minlength="6" required />
              </div>
            </div>
            <button class="btn-primary" type="submit">初始化管理员</button>
          </form>

          <form id="loginForm" class="hidden">
            <div class="two-col">
              <div class="field">
                <label for="loginUsername">用户名</label>
                <input id="loginUsername" required />
              </div>
              <div class="field">
                <label for="loginPassword">密码</label>
                <input id="loginPassword" type="password" minlength="6" required />
              </div>
            </div>
            <button class="btn-primary" type="submit">登录</button>
          </form>
        </section>

        <section class="panel main-tabs hidden" id="mainTabsPanel">
          <div class="tab-buttons">
            <button id="tabDashboardBtn" class="tab-btn active" type="button">看板与配置</button>
            <button id="tabAdminBtn" class="tab-btn hidden" type="button">管理员入口</button>
          </div>
        </section>

        <section class="tab-page hidden" id="dashboardTabPage">
          <section class="panel progress hidden" id="progressPanel">
            <h2>更新进度</h2>
            <form id="progressForm">
              <div class="two-col">
                <div class="field">
                  <label for="progressProjectId">项目</label>
                  <select id="progressProjectId" required></select>
                </div>
                <div class="field">
                  <label for="progressGoalId">目标（仅显示你可更新的）</label>
                  <select id="progressGoalId" required></select>
                </div>
              </div>
              <div class="two-col">
                <div class="field">
                  <label for="progressDate">日期</label>
                  <input id="progressDate" type="date" required />
                </div>
                <div id="progressRequirementFields" class="two-col" style="grid-column: span 2;">
                  <div class="field">
                    <label for="progressRequirementTotal">需求总数</label>
                    <input id="progressRequirementTotal" type="number" min="0" step="1" />
                  </div>
                  <div class="field">
                    <label for="progressRequirementDone">已完成需求数</label>
                    <input id="progressRequirementDone" type="number" min="0" step="1" />
                  </div>
                </div>
                <div class="field hidden" id="progressPercentField">
                  <label for="progressValue">完成率 0-100（兼容模式）</label>
                  <input id="progressValue" type="number" min="0" max="100" step="0.01" />
                </div>
                <div class="field hidden" id="progressRemainingDiField">
                  <label for="progressRemainingDi">剩余 DI</label>
                  <input id="progressRemainingDi" type="number" min="0" step="0.01" />
                </div>
              </div>
              <p class="hint" id="progressInputHint">需求型目标按“总数+已完成”自动计算进度。</p>
              <div class="field">
                <label for="progressUpdatedBy">更新人</label>
                <input id="progressUpdatedBy" value="web_user" required />
              </div>
              <div class="field">
                <label for="progressNote">备注（回退必填）</label>
                <textarea id="progressNote"></textarea>
              </div>
              <button class="btn-primary" type="submit">提交进度</button>
            </form>
          </section>

          <section class="panel dashboard hidden" id="dashboardPanel">
            <h2>实时项目看板 + 甘特图</h2>
            <div id="dashboard" class="project-grid"></div>
          </section>

          <section class="panel ops hidden admin-only" id="opsPanel">
            <h2>创建与维护（位于甘特图下方）</h2>
            <div class="tab-buttons">
              <button id="opsProjectBtn" class="tab-btn active" type="button">创建项目</button>
              <button id="opsPhaseBtn" class="tab-btn" type="button">添加阶段</button>
              <button id="opsGoalBtn" class="tab-btn" type="button">添加目标</button>
              <button id="opsPhaseEditBtn" class="tab-btn" type="button">修改/删除阶段</button>
              <button id="opsGoalEditBtn" class="tab-btn" type="button">修改/删除目标</button>
            </div>

            <section class="sub-tab-page project" id="projectPanel">
              <form id="projectForm">
                <div class="field">
                  <label for="projectName">项目名称</label>
                  <input id="projectName" required />
                </div>
                <div class="field">
                  <label for="projectDeadline">项目截止日期</label>
                  <input id="projectDeadline" type="date" required />
                </div>
                <div class="field">
                  <label for="projectParticipants">参与者（每行：姓名,邮箱）</label>
                  <textarea id="projectParticipants" required placeholder="张三,zhangsan@example.com\n李四,lisi@example.com"></textarea>
                </div>
                <button class="btn-primary" type="submit">创建项目</button>
              </form>
            </section>

            <section class="sub-tab-page phase hidden" id="phasePanel">
              <form id="phaseForm">
                <div class="field">
                  <label for="phaseProjectId">所属项目</label>
                  <select id="phaseProjectId" required></select>
                </div>
                <div class="field">
                  <label for="phaseName">阶段名称</label>
                  <input id="phaseName" required />
                </div>
                <div class="field">
                  <label for="phaseObjective">阶段目标</label>
                  <textarea id="phaseObjective" required></textarea>
                </div>
                <button class="btn-primary" type="submit">添加阶段</button>
              </form>
            </section>

            <section class="sub-tab-page goal hidden" id="goalPanel">
              <form id="goalForm">
                <div class="field">
                  <label for="goalPhaseId">所属阶段</label>
                  <select id="goalPhaseId" required></select>
                </div>
                <div class="field">
                  <label for="goalOwnerId">负责人</label>
                  <select id="goalOwnerId" required></select>
                </div>
                <div class="field">
                  <label for="goalType">目标类型</label>
                  <select id="goalType" required>
                    <option value="requirement">需求型（按完成率）</option>
                    <option value="issue">问题单型（按剩余 DI）</option>
                  </select>
                </div>
                <div class="field">
                  <label for="goalTitle">目标标题</label>
                  <input id="goalTitle" required />
                </div>
                <div class="field" id="goalRequirementPriorityField">
                  <label for="goalRequirementPriority">需求优先级（1 最高，5 最低）</label>
                  <select id="goalRequirementPriority">
                    <option value="">不指定</option>
                    <option value="1">P1</option>
                    <option value="2">P2</option>
                    <option value="3">P3</option>
                    <option value="4">P4</option>
                    <option value="5">P5</option>
                  </select>
                </div>
                <div id="goalIssueFields" class="hidden">
                  <div class="field">
                    <label for="goalIssueModule">问题单模块</label>
                    <input id="goalIssueModule" placeholder="例如：支付、订单、权限" />
                  </div>
                  <div class="field">
                    <label for="goalIssueTotalDi">问题单总 DI</label>
                    <input id="goalIssueTotalDi" type="number" min="0.01" step="0.01" />
                  </div>
                </div>
                <div class="two-col">
                  <div class="field">
                    <label for="goalMilestoneDate">里程碑日期</label>
                    <input id="goalMilestoneDate" type="date" required />
                  </div>
                  <div class="field">
                    <label for="goalDeadline">目标截止日期</label>
                    <input id="goalDeadline" type="date" required />
                  </div>
                </div>
                <div class="field">
                  <label for="goalWeight">权重</label>
                  <input id="goalWeight" type="number" min="0.01" step="0.01" value="1" required />
                </div>
                <div class="field">
                  <label for="goalNote">目标备注</label>
                  <textarea id="goalNote" placeholder="补充目标背景、范围说明、依赖等，悬停可查看"></textarea>
                </div>
                <p class="hint">权重仅用于项目完成率聚合，不等于 DI。需求型默认按优先级映射（P1=5...P5=1）；问题单型默认权重为 1，建议按业务影响手工调整。</p>
                <button class="btn-primary" type="submit">添加目标</button>
              </form>
            </section>

            <section class="sub-tab-page phase-edit hidden" id="phaseEditPanel">
              <form id="phaseEditForm">
                <div class="field">
                  <label for="phaseEditId">选择阶段</label>
                  <select id="phaseEditId" required></select>
                </div>
                <div class="field">
                  <label for="phaseEditName">阶段名称</label>
                  <input id="phaseEditName" required />
                </div>
                <div class="field">
                  <label for="phaseEditObjective">阶段目标</label>
                  <textarea id="phaseEditObjective" required></textarea>
                </div>
                <div class="field">
                  <label for="phaseEditOrder">排序</label>
                  <input id="phaseEditOrder" type="number" min="1" step="1" />
                </div>
                <div class="tab-buttons">
                  <button class="btn-primary" type="submit">保存阶段</button>
                  <button class="btn-danger" id="phaseDeleteBtn" type="button">删除阶段</button>
                </div>
              </form>
            </section>

            <section class="sub-tab-page goal-edit hidden" id="goalEditPanel">
              <form id="goalEditForm">
                <div class="field">
                  <label for="goalEditId">选择目标</label>
                  <select id="goalEditId" required></select>
                </div>
                <div class="field">
                  <label for="goalEditOwnerId">负责人</label>
                  <select id="goalEditOwnerId" required></select>
                </div>
                <div class="field">
                  <label for="goalEditType">目标类型</label>
                  <select id="goalEditType" required>
                    <option value="requirement">需求型（按完成率）</option>
                    <option value="issue">问题单型（按剩余 DI）</option>
                  </select>
                </div>
                <div class="field">
                  <label for="goalEditTitle">目标标题</label>
                  <input id="goalEditTitle" required />
                </div>
                <div class="field" id="goalEditRequirementPriorityField">
                  <label for="goalEditRequirementPriority">需求优先级</label>
                  <select id="goalEditRequirementPriority">
                    <option value="">不指定</option>
                    <option value="1">P1</option>
                    <option value="2">P2</option>
                    <option value="3">P3</option>
                    <option value="4">P4</option>
                    <option value="5">P5</option>
                  </select>
                </div>
                <div id="goalEditIssueFields" class="hidden">
                  <div class="field">

      function todayISO() {
        return new Date().toISOString().slice(0, 10);
      }

      function showStatus(message, kind = "ok") {
        dom.statusBar.textContent = message;
        dom.statusBar.className = `status ${kind}`;
      }

      function resolveInitialTheme() {
        if (state.theme === "dark" || state.theme === "light") {
          return state.theme;
        }
        if (window.matchMedia && window.matchMedia("(prefers-color-scheme: dark)").matches) {
          return "dark";
        }
        return "light";
      }

      function applyTheme(theme) {
        const useDark = theme === "dark";
        document.body.classList.toggle("theme-dark", useDark);
        state.theme = useDark ? "dark" : "light";
        localStorage.setItem(THEME_KEY, state.theme);
        dom.themeToggle.textContent = useDark ? "浅色模式" : "夜间模式";
      }

      function toggleTheme() {
        applyTheme(state.theme === "dark" ? "light" : "dark");
      }

      function escapeHtml(value) {
        return String(value)
          .replace(/&/g, "&amp;")
          .replace(/</g, "&lt;")
          .replace(/>/g, "&gt;")
          .replace(/\"/g, "&quot;")
          .replace(/'/g, "&#39;");
      }

      function clearAuth() {
        state.token = "";
        state.me = null;
        localStorage.removeItem(TOKEN_KEY);
      }

      function setToken(token) {
        state.token = token;
        localStorage.setItem(TOKEN_KEY, token);
      }

      function authHeader() {
        return state.token ? { Authorization: `Bearer ${state.token}` } : {};
      }

      async function requestJson(path, options = {}) {
        const headers = {
          "Content-Type": "application/json",
          ...authHeader(),
          ...(options.headers || {}),
        };

        const resp = await fetch(path, { ...options, headers });
        let data = null;
        try {
          data = await resp.json();
        } catch (err) {
          data = null;
        }

        if (!resp.ok) {
          const detail = data && data.detail ? data.detail : `请求失败: ${resp.status}`;
          if (resp.status === 401) {
            clearAuth();
            updateAuthUi();
          }
          throw new Error(detail);
        }
        return data;
      }

      function parseParticipants(raw) {
        return raw
          .split("\n")
          .map((line) => line.trim())
          .filter(Boolean)
          .map((line) => {
            const parts = line.split(",");
            if (parts.length < 2) {
              throw new Error(`参与者格式错误: ${line}`);
            }
            const name = parts[0].trim();
            const email = parts.slice(1).join(",").trim();
            if (!name || !email) {
              throw new Error(`参与者格式错误: ${line}`);
            }
            return { name, email };
          });
      }

      function upsertSelectOptions(selectEl, options, preferred = "") {
        const keep = preferred || selectEl.value;
        selectEl.innerHTML = "";

        if (!options.length) {
          const opt = document.createElement("option");
          opt.value = "";
          opt.textContent = "暂无可选项";
          selectEl.appendChild(opt);
          return;
        }

        options.forEach((item) => {
          const opt = document.createElement("option");
          opt.value = String(item.value);
          opt.textContent = item.label;
          if (String(item.value) === String(keep)) {
            opt.selected = true;
          }
          selectEl.appendChild(opt);
        });

        if (!selectEl.value && options.length) {
          selectEl.value = String(options[0].value);
        }
      }

      function defaultWeightForPriority(priority) {
        const p = Number(priority);
        if (!Number.isInteger(p) || p < 1 || p > 5) return 1;
        return 6 - p;
      }

      function goalTypeLabel(goal) {
        if (goal.goal_type === "issue") {
          return `问题单 / ${goal.issue_module || "未分模块"}`;
        }
        if (goal.requirement_priority) {
          return `需求 / P${goal.requirement_priority}`;
        }
        return "需求 / 未分级";
      }

      function goalRiskClass(goal) {
        const progress = Number(goal.progress_percent || 0);
        const today = new Date(`${todayISO()}T00:00:00`);
        const deadline = new Date(`${goal.deadline}T00:00:00`);
        const daysLeft = Math.floor((deadline - today) / 86400000);
        if (daysLeft <= 1 && progress < 90) return "risk-red";
        if (daysLeft <= 3 && progress < 80) return "risk-yellow";
        return "risk-green";
      }

      function goalRiskLabel(goal) {
        const riskClass = goalRiskClass(goal);
        if (riskClass === "risk-red") return "截止前1天<90%，红色预警";
        if (riskClass === "risk-yellow") return "截止前3天<80%，黄色预警";
        return "进度正常";
      }

      function chipClass(value) {
        const n = Number(value);
        if (n >= 80) return "good";
        if (n >= 40) return "warn";
        return "bad";
      }

      function ganttColorsByRiskClass(riskClass) {
        if (riskClass === "risk-red") {
          return {
            bar: "linear-gradient(90deg, #b91c1c, #ef4444)",
            fill: "rgba(153, 27, 27, 0.92)",
          };
        }
        if (riskClass === "risk-yellow") {
          return {
            bar: "linear-gradient(90deg, #b45309, #f59e0b)",
            fill: "rgba(180, 83, 9, 0.9)",
          };
        }
        return {
          bar: "linear-gradient(90deg, #0f766e, #16a34a)",
          fill: "rgba(21, 128, 61, 0.95)",
        };
      }

      function toDateNumber(iso) {
        return new Date(`${iso}T00:00:00`).getTime();
      }

      function renderGantt(project) {
        const goals = [];
        project.phases.forEach((phase) => {
          phase.goals.forEach((goal) => {
            goals.push({
              ...goal,
              phaseName: phase.name,
            });
          });
        });

        if (!goals.length) {
          return '<div class="empty" style="padding: 12px;">暂无目标，无法绘制甘特图</div>';
        }

        const starts = goals.map((g) => toDateNumber(g.milestone_date));
        const ends = goals.map((g) => toDateNumber(g.deadline));
        const minStart = Math.min(...starts);
        const maxEnd = Math.max(...ends);
        const totalDays = Math.max(1, Math.floor((maxEnd - minStart) / 86400000) + 1);

        const rows = goals
          .sort((a, b) => {
            const diff = toDateNumber(a.milestone_date) - toDateNumber(b.milestone_date);
            if (diff !== 0) return diff;
            return a.id - b.id;
          })
          .map((goal) => {
            const startDay = Math.floor((toDateNumber(goal.milestone_date) - minStart) / 86400000);
            const duration = Math.max(1, Math.floor((toDateNumber(goal.deadline) - toDateNumber(goal.milestone_date)) / 86400000) + 1);
            const left = (startDay / totalDays) * 100;
            const width = (duration / totalDays) * 100;
            const fill = Math.max(0, Math.min(100, Number(goal.progress_percent || 0)));
            const riskClass = goalRiskClass(goal);
            const riskLabel = goalRiskLabel(goal);
            const riskColors = ganttColorsByRiskClass(riskClass);
            const noteText = goal.note ? ` | 备注：${goal.note}` : "";
            const progressText = goal.goal_type === "issue"
              ? `${fill.toFixed(2)}% | 剩余DI:${Number(goal.remaining_di ?? goal.issue_total_di ?? 0).toFixed(2)}`
              : `${fill.toFixed(2)}% | 需求:${Number(goal.requirement_done_count ?? 0)}/${Number(goal.requirement_total_count ?? 0)}`;

            return `<div class="gantt-row">
              <div class="gantt-label" title="${escapeHtml(goal.phaseName)} / ${escapeHtml(goal.title)}${escapeHtml(noteText)}">${escapeHtml(goal.phaseName)} / ${escapeHtml(goal.title)}</div>
              <div>
                <div class="gantt-track">
                  <div class="gantt-bar ${riskClass}" style="left:${left}%; width:${Math.max(1, width)}%; background:${riskColors.bar};">
                    <div class="gantt-fill ${riskClass}" style="width:${fill}%; background:${riskColors.fill};"></div>
                  </div>
                </div>
                <div class="gantt-meta">${escapeHtml(goal.milestone_date)} ~ ${escapeHtml(goal.deadline)} | 负责人：${escapeHtml(goal.owner_name)} | 进度：${escapeHtml(progressText)} | ${escapeHtml(riskLabel)}</div>
              </div>
            </div>`;
          })
          .join("");

        const range = `${new Date(minStart).toISOString().slice(0, 10)} ~ ${new Date(maxEnd).toISOString().slice(0, 10)}`;
        return `<div class="gantt"><p class="gantt-title">甘特图范围：${range}</p>${rows}</div>`;
      }

      function renderUserList() {
        if (!state.users.length) {
          dom.userList.className = "empty";
          dom.userList.textContent = "暂无账号";
          return;
        }

        const rows = state.users
          .map((user) => {
            const bind = user.participant_name ? `${user.participant_name} <${user.participant_email}>` : "-";
            return `<tr><td>${user.id}</td><td>${escapeHtml(user.username)}</td><td>${escapeHtml(user.role)}</td><td>${escapeHtml(bind)}</td></tr>`;
          })
          .join("");
        dom.userList.className = "";
        dom.userList.innerHTML = `<table><thead><tr><th>ID</th><th>用户名</th><th>角色</th><th>绑定参与者</th></tr></thead><tbody>${rows}</tbody></table>`;
      }

      function renderDashboard() {
        if (!state.projects.length) {
          dom.dashboard.innerHTML = '<div class="empty">暂无可见项目。管理员可先创建项目；负责人只会看到自己所属项目。</div>';
          return;
        }

        const html = state.projects
          .map((project) => {
            const projectProgress = Number(project.summary.progress_percent || 0);
            const phasesHtml = project.phases
              .map((phase) => {
                const phaseProgress = Number(phase.summary.progress_percent || 0);
                const goalsRows = phase.goals.length
                  ? phase.goals
                      .map((goal) => {
                        const riskClass = goalRiskClass(goal);
                        const riskLabel = goalRiskLabel(goal);
                        const noteBadge = goal.note
                          ? ` <span class="meta" title="${escapeHtml(goal.note)}">(备注)</span>`
                          : "";
                        const progressText = goal.goal_type === "issue"
                          ? `${Number(goal.progress_percent).toFixed(2)}% / DI:${Number(goal.remaining_di ?? goal.issue_total_di ?? 0).toFixed(2)}`
                          : `${Number(goal.progress_percent).toFixed(2)}% / 需求:${Number(goal.requirement_done_count ?? 0)}/${Number(goal.requirement_total_count ?? 0)}`;
                        return `<tr>
                      <td>${escapeHtml(goal.title)}${noteBadge}</td>
                      <td>${escapeHtml(goalTypeLabel(goal))}</td>
                      <td>${escapeHtml(goal.owner_name)}</td>
                      <td><span class="chip ${riskClass}" title="${escapeHtml(riskLabel)}">${escapeHtml(progressText)}</span></td>
                      <td>${Number(goal.weight).toFixed(2)}</td>
                      <td>${escapeHtml(goal.milestone_date)}</td>
                      <td>${escapeHtml(goal.deadline)}</td>
                    </tr>`;
                      })
                      .join("")
                  : '<tr><td colspan="7">暂无目标</td></tr>';

                return `<div class="phase-card">
                  <div class="phase-head">
                    <h3>${escapeHtml(phase.name)}</h3>
                    <span class="chip ${chipClass(phaseProgress)}">${phaseProgress.toFixed(2)}%</span>
                  </div>
                  <p class="phase-objective">${escapeHtml(phase.objective)}</p>
                  <div class="progress-wrap"><div class="progress-bar" style="width:${Math.max(0, Math.min(100, phaseProgress))}%"></div></div>
                  <div class="meta">完成目标：${phase.summary.completed_goals}/${phase.summary.total_goals}</div>
                  <table>
                    <thead><tr><th>目标</th><th>类型</th><th>负责人</th><th>进度</th><th>权重</th><th>里程碑</th><th>截止</th></tr></thead>
                    <tbody>${goalsRows}</tbody>
                  </table>
                </div>`;
              })
              .join("");

            return `<article class="project-card">
              <div class="project-head">
                <div>
                  <h3 class="project-name">#${project.id} ${escapeHtml(project.name)}</h3>
                  <p class="meta">截止：${escapeHtml(project.deadline)} | 状态：${escapeHtml(project.status)} | 参与者：${project.participants.length}</p>
                </div>
                <span class="chip ${chipClass(projectProgress)}">${projectProgress.toFixed(2)}%</span>
              </div>
              <div class="progress-wrap"><div class="progress-bar" style="width:${Math.max(0, Math.min(100, projectProgress))}%"></div></div>
              <div class="meta">目标完成：${project.summary.completed_goals}/${project.summary.total_goals}</div>
              <div class="phase-grid">${phasesHtml || '<div class="empty">暂无阶段</div>'}</div>
              ${renderGantt(project)}
            </article>`;
          })
          .join("");

        dom.dashboard.innerHTML = html;
      }

      function rebuildIndexes() {
        state.projectMap = new Map();
        state.phaseMap = new Map();
        state.goalMap = new Map();

        state.projects.forEach((project) => {
          state.projectMap.set(project.id, project);
          project.phases.forEach((phase) => {
            state.phaseMap.set(phase.id, { ...phase, projectId: project.id, participants: project.participants });
            phase.goals.forEach((goal) => {
              state.goalMap.set(goal.id, { ...goal, phaseId: phase.id, projectId: project.id });
            });
          });
        });
      }

      function syncGoalOwnersByPhase() {
        const phase = state.phaseMap.get(Number(dom.goalPhaseId.value || 0));
        const options = (phase?.participants || []).map((p) => ({
          value: p.id,
          label: `${p.name} <${p.email}>`,
        }));
        upsertSelectOptions(dom.goalOwnerId, options);
      }

      function syncGoalTypeFields() {
        const isIssue = dom.goalType.value === "issue";
        dom.goalIssueFields.classList.toggle("hidden", !isIssue);
        dom.goalRequirementPriorityField.classList.toggle("hidden", isIssue);

        if (isIssue) {
          if (!dom.goalIssueTotalDi.value) {
            dom.goalIssueTotalDi.value = "1";
          }
          if (!dom.goalWeight.value) {
            dom.goalWeight.value = "1";
          }
        } else {
          const priority = dom.goalRequirementPriority.value;
          dom.goalWeight.value = String(defaultWeightForPriority(priority));
        }
      }

      function syncPhaseEditForm() {
        const options = [];
        state.projects.forEach((project) => {
          project.phases.forEach((phase) => {
            options.push({
              value: phase.id,
              label: `${project.name} / ${phase.name}`,
            });
          });
        });
        upsertSelectOptions(dom.phaseEditId, options);

        const phase = state.phaseMap.get(Number(dom.phaseEditId.value || 0));
        if (!phase) {
          dom.phaseEditName.value = "";
          dom.phaseEditObjective.value = "";
          dom.phaseEditOrder.value = "";
          return;
        }
        dom.phaseEditName.value = phase.name || "";
        dom.phaseEditObjective.value = phase.objective || "";
        dom.phaseEditOrder.value = String(phase.order_index || "");
      }

      function syncGoalEditTypeFields() {
        const isIssue = dom.goalEditType.value === "issue";
        dom.goalEditIssueFields.classList.toggle("hidden", !isIssue);
        dom.goalEditRequirementPriorityField.classList.toggle("hidden", isIssue);
        if (isIssue) {
          if (!dom.goalEditWeight.value) {
            dom.goalEditWeight.value = "1";
          }
        } else {
          if (!dom.goalEditWeight.value) {
            dom.goalEditWeight.value = String(defaultWeightForPriority(dom.goalEditRequirementPriority.value));
          }
        }
      }

      function syncGoalEditOwnersByGoal() {
        const goal = state.goalMap.get(Number(dom.goalEditId.value || 0));
        const project = goal ? state.projectMap.get(goal.projectId) : null;
        const options = (project?.participants || []).map((p) => ({
          value: p.id,
          label: `${p.name} <${p.email}>`,
        }));
        upsertSelectOptions(dom.goalEditOwnerId, options, goal ? String(goal.owner_participant_id) : "");
      }

      function syncGoalEditForm() {
        const options = [];
        state.projects.forEach((project) => {
          project.phases.forEach((phase) => {
            phase.goals.forEach((goal) => {
              options.push({
                value: goal.id,
                label: `${project.name} / ${phase.name} / ${goal.title}`,
              });
            });
          });
        });
        upsertSelectOptions(dom.goalEditId, options);

        const goal = state.goalMap.get(Number(dom.goalEditId.value || 0));
        syncGoalEditOwnersByGoal();
        if (!goal) {
          dom.goalEditTitle.value = "";
          dom.goalEditNote.value = "";
          dom.goalEditType.value = "requirement";
          dom.goalEditRequirementPriority.value = "";
          dom.goalEditIssueModule.value = "";
          dom.goalEditIssueTotalDi.value = "";
          dom.goalEditMilestoneDate.value = "";
          dom.goalEditDeadline.value = "";
          dom.goalEditWeight.value = "1";
          syncGoalEditTypeFields();
          return;
        }

        dom.goalEditTitle.value = goal.title || "";
        dom.goalEditNote.value = goal.note || "";
        dom.goalEditType.value = goal.goal_type || "requirement";
        dom.goalEditRequirementPriority.value = goal.requirement_priority ? String(goal.requirement_priority) : "";
        dom.goalEditIssueModule.value = goal.issue_module || "";
        dom.goalEditIssueTotalDi.value = goal.issue_total_di != null ? String(goal.issue_total_di) : "";
        dom.goalEditMilestoneDate.value = goal.milestone_date || "";
        dom.goalEditDeadline.value = goal.deadline || "";
        dom.goalEditWeight.value = goal.weight != null ? String(goal.weight) : "1";
        syncGoalEditTypeFields();
      }

      function syncProgressInputMode() {
        const goal = state.goalMap.get(Number(dom.progressGoalId.value || 0));
        const isIssue = goal && goal.goal_type === "issue";

        dom.progressRequirementFields.classList.toggle("hidden", !!isIssue);
        dom.progressPercentField.classList.add("hidden");
        dom.progressRemainingDiField.classList.toggle("hidden", !isIssue);

        if (isIssue) {
          const currentRemaining = Number(goal.remaining_di ?? goal.issue_total_di ?? 0);
          dom.progressRemainingDi.value = Number.isFinite(currentRemaining) ? currentRemaining.toFixed(2) : "0";
          dom.progressInputHint.textContent = `问题单型目标：按剩余 DI 跟踪（当前剩余 ${dom.progressRemainingDi.value}）`;
        } else {
          const currentProgress = Number(goal ? goal.progress_percent : 0);
          dom.progressValue.value = Number.isFinite(currentProgress) ? currentProgress.toFixed(2) : "0";
          dom.progressRequirementTotal.value = goal && goal.requirement_total_count != null
            ? String(goal.requirement_total_count)
            : "";
          dom.progressRequirementDone.value = goal && goal.requirement_done_count != null
            ? String(goal.requirement_done_count)
            : "";
          dom.progressInputHint.textContent = "需求型目标：录入需求总数与已完成需求数，自动计算进度。";
        }
      }

      function syncProgressGoalsByProject() {
        const project = state.projectMap.get(Number(dom.progressProjectId.value || 0));
        const options = [];
        (project?.phases || []).forEach((phase) => {
          phase.goals
            .filter((goal) => goal.editable)
            .forEach((goal) => {
              const progressText = goal.goal_type === "issue"
                ? `${Number(goal.progress_percent).toFixed(2)}% / DI:${Number(goal.remaining_di ?? goal.issue_total_di ?? 0).toFixed(2)}`
                : `${Number(goal.progress_percent).toFixed(2)}% / 需求:${Number(goal.requirement_done_count ?? 0)}/${Number(goal.requirement_total_count ?? 0)}`;
              options.push({
                value: goal.id,
                label: `${phase.name} / ${goal.title} (${progressText})`,
              });
            });
        });
        upsertSelectOptions(dom.progressGoalId, options);
        syncProgressInputMode();
      }

      function refreshSelectors() {
        const projectOpts = state.projects.map((p) => ({ value: p.id, label: `#${p.id} ${p.name}` }));
        upsertSelectOptions(dom.phaseProjectId, projectOpts);
        upsertSelectOptions(dom.progressProjectId, projectOpts);

        const phaseOpts = [];
        state.projects.forEach((project) => {
          project.phases.forEach((phase) => {
            phaseOpts.push({ value: phase.id, label: `${project.name} / ${phase.name}` });
          });
        });
        upsertSelectOptions(dom.goalPhaseId, phaseOpts);

        syncGoalOwnersByPhase();
        syncGoalTypeFields();
        syncPhaseEditForm();
        syncGoalEditForm();
        syncProgressGoalsByProject();
      }

      function refreshParticipantOptionsForUserCreation() {
        const options = state.participantOptions.map((item) => ({
          value: item.id,
          label: `#${item.id} [项目${item.project_id}] ${item.name} <${item.email}>`,
        }));
        upsertSelectOptions(dom.newParticipantId, options);
      }

      function setMainTab(tab) {
        state.activeMainTab = tab === "admin" ? "admin" : "dashboard";
        const isAdminTab = state.activeMainTab === "admin";

        dom.tabDashboardBtn.classList.toggle("active", !isAdminTab);
        dom.tabAdminBtn.classList.toggle("active", isAdminTab);
        dom.dashboardTabPage.classList.toggle("hidden", isAdminTab);
        dom.adminTabPage.classList.toggle("hidden", !isAdminTab);
      }

      function setOpsTab(tab) {
        const valid = new Set(["project", "phase", "goal", "phase-edit", "goal-edit"]);
        state.activeOpsTab = valid.has(tab) ? tab : "project";

        dom.opsProjectBtn.classList.toggle("active", state.activeOpsTab === "project");
        dom.opsPhaseBtn.classList.toggle("active", state.activeOpsTab === "phase");
        dom.opsGoalBtn.classList.toggle("active", state.activeOpsTab === "goal");
        dom.opsPhaseEditBtn.classList.toggle("active", state.activeOpsTab === "phase-edit");
        dom.opsGoalEditBtn.classList.toggle("active", state.activeOpsTab === "goal-edit");

        dom.projectPanel.classList.toggle("hidden", state.activeOpsTab !== "project");
        dom.phasePanel.classList.toggle("hidden", state.activeOpsTab !== "phase");
        dom.goalPanel.classList.toggle("hidden", state.activeOpsTab !== "goal");
        dom.phaseEditPanel.classList.toggle("hidden", state.activeOpsTab !== "phase-edit");
        dom.goalEditPanel.classList.toggle("hidden", state.activeOpsTab !== "goal-edit");
      }

      function updateAuthUi() {
        const loggedIn = !!state.me;
        dom.refreshNow.classList.toggle("hidden", !loggedIn);
        dom.logoutBtn.classList.toggle("hidden", !loggedIn);

        if (!loggedIn) {
          dom.currentUser.textContent = "未登录";
          dom.mainTabsPanel.classList.add("hidden");
          dom.dashboardTabPage.classList.add("hidden");
          dom.adminTabPage.classList.add("hidden");
          dom.opsPanel.classList.add("hidden");
          dom.progressPanel.classList.add("hidden");
          dom.dashboardPanel.classList.add("hidden");
          dom.adminUserPanel.classList.add("hidden");
          return;
        }

        dom.currentUser.textContent = `${state.me.username} (${state.me.role})`;
        dom.mainTabsPanel.classList.remove("hidden");
        dom.progressPanel.classList.remove("hidden");
        dom.dashboardPanel.classList.remove("hidden");
        dom.dashboardTabPage.classList.remove("hidden");

        if (state.me.role === "admin") {
          dom.opsPanel.classList.remove("hidden");
          dom.tabAdminBtn.classList.remove("hidden");
          dom.adminUserPanel.classList.remove("hidden");
        } else {
          dom.opsPanel.classList.add("hidden");
          dom.tabAdminBtn.classList.add("hidden");
          if (state.activeMainTab === "admin") {
            setMainTab("dashboard");
          }
          dom.adminUserPanel.classList.add("hidden");
        }

        setMainTab(state.activeMainTab);
        setOpsTab(state.activeOpsTab);
      }

      async function loadProjects(silent = false) {
        const data = await requestJson(`/api/projects?as_of=${todayISO()}`);
        state.projects = data.projects || [];
        rebuildIndexes();
        refreshSelectors();
        renderDashboard();
        if (!silent) {
          showStatus(`刷新成功：${new Date().toLocaleTimeString()}`, "ok");
        }
      }

      async function loadUsersAndParticipants() {
        if (!state.me || state.me.role !== "admin") {
          return;
        }
        const usersData = await requestJson("/api/auth/users");
        state.users = usersData.users || [];
        renderUserList();

        const participantData = await requestJson("/api/participants");
        state.participantOptions = participantData.participants || [];
        refreshParticipantOptionsForUserCreation();
      }

      async function refreshAll(silent = false) {
        await loadProjects(silent);
        await loadUsersAndParticipants();
      }

      async function loadMeFromToken() {
        if (!state.token) return false;
        try {
          const data = await requestJson("/api/auth/me");
          state.me = data.user;
          return true;
        } catch (err) {
          clearAuth();
          state.me = null;
          return false;
        }
      }

      async function setupAuthPanel() {
        const status = await requestJson("/api/auth/status", { headers: {} });
        const bootstrapped = !!status.bootstrapped;

        if (!status.auth_secret_configured) {
          showStatus("检测到默认 auth_secret，生产环境请修改 .scheduler.toml", "warn");
        }

        if (!bootstrapped) {
          dom.bootstrapForm.classList.remove("hidden");
          dom.loginForm.classList.add("hidden");
          showStatus("请先初始化管理员账号", "warn");
          return;
        }

        dom.bootstrapForm.classList.add("hidden");
        dom.loginForm.classList.remove("hidden");
      }

      async function handleBootstrap(event) {
        event.preventDefault();
        try {
          const data = await requestJson("/api/auth/bootstrap-admin", {
            method: "POST",
            headers: {},
            body: JSON.stringify({
              username: document.getElementById("bootstrapUsername").value.trim(),
              password: document.getElementById("bootstrapPassword").value,
            }),
          });
          setToken(data.token);
          state.me = data.user;
          dom.authPanel.classList.add("hidden");
          updateAuthUi();
          await refreshAll();
          showStatus("管理员初始化并登录成功", "ok");
        } catch (err) {
          showStatus(err.message, "error");
        }
      }

      async function handleLogin(event) {
        event.preventDefault();
        try {
          const data = await requestJson("/api/auth/login", {
            method: "POST",
            headers: {},
            body: JSON.stringify({
              username: document.getElementById("loginUsername").value.trim(),
              password: document.getElementById("loginPassword").value,
            }),
          });
          setToken(data.token);
          state.me = data.user;
          dom.authPanel.classList.add("hidden");
          updateAuthUi();
          await refreshAll();
          showStatus("登录成功", "ok");
        } catch (err) {
          showStatus(err.message, "error");
        }
      }

      function handleLogout() {
        clearAuth();
        state.projects = [];
        state.users = [];
        state.participantOptions = [];
        state.activeMainTab = "dashboard";
        state.activeOpsTab = "project";
        state.me = null;
        dom.dashboard.innerHTML = "";
        dom.authPanel.classList.remove("hidden");
        dom.loginForm.classList.remove("hidden");
        dom.bootstrapForm.classList.add("hidden");
        updateAuthUi();
        showStatus("已登出", "ok");
      }

      async function handleCreateUser(event) {
        event.preventDefault();
        try {
          const role = dom.newRole.value;
          const participantId = role === "owner" ? Number(dom.newParticipantId.value) : null;

          await requestJson("/api/auth/users", {
            method: "POST",
            body: JSON.stringify({
              username: document.getElementById("newUsername").value.trim(),
              password: document.getElementById("newPassword").value,
              role,
              participant_id: participantId,
            }),
          });

          dom.createUserForm.reset();
          dom.newRole.value = "owner";
          toggleParticipantField();
          await loadUsersAndParticipants();
          showStatus("账号创建成功", "ok");
        } catch (err) {
          showStatus(err.message, "error");
        }
      }

      async function handleCreateProject(event) {
        event.preventDefault();
        try {
          const participants = parseParticipants(dom.projectParticipants.value);
          if (!participants.length) {
            throw new Error("至少输入 1 位参与者");
          }
          await requestJson("/api/projects", {
            method: "POST",
            body: JSON.stringify({
              name: document.getElementById("projectName").value.trim(),
              deadline: dom.projectDeadline.value,
              participants,
            }),
          });
          dom.projectForm.reset();
          dom.projectDeadline.value = todayISO();
          await refreshAll(true);
          showStatus("项目创建成功", "ok");
        } catch (err) {
          showStatus(err.message, "error");
        }
      }

      async function handleCreatePhase(event) {
        event.preventDefault();
        try {
          await requestJson("/api/phases", {
            method: "POST",
            body: JSON.stringify({
              project_id: Number(dom.phaseProjectId.value),
              name: dom.phaseName.value.trim(),
              objective: dom.phaseObjective.value.trim(),
            }),
          });
          dom.phaseForm.reset();
          await refreshAll(true);
          showStatus("阶段添加成功", "ok");
        } catch (err) {
          showStatus(err.message, "error");
        }
      }

      async function handleCreateGoal(event) {
        event.preventDefault();
        try {
          const goalType = dom.goalType.value;
          const issueTotalDi = Number(dom.goalIssueTotalDi.value);
          if (goalType === "issue") {
            if (!dom.goalIssueModule.value.trim()) {
              throw new Error("问题单型目标必须填写模块");
            }
            if (Number.isNaN(issueTotalDi) || issueTotalDi <= 0) {
              throw new Error("问题单总 DI 必须大于 0");
            }
          }

          await requestJson("/api/goals", {
            method: "POST",
            body: JSON.stringify({
              phase_id: Number(dom.goalPhaseId.value),
              title: dom.goalTitle.value.trim(),
              note: dom.goalNote.value.trim() || null,
              owner_participant_id: Number(dom.goalOwnerId.value),
              goal_type: goalType,
              requirement_priority: goalType === "requirement" && dom.goalRequirementPriority.value
                ? Number(dom.goalRequirementPriority.value)
                : null,
              issue_module: goalType === "issue" ? dom.goalIssueModule.value.trim() : null,
              issue_total_di: goalType === "issue" ? issueTotalDi : null,
              milestone_date: dom.goalMilestoneDate.value,
              deadline: dom.goalDeadline.value,
              weight: Number(dom.goalWeight.value || 1),
            }),
          });
          dom.goalForm.reset();
          dom.goalType.value = "requirement";
          dom.goalWeight.value = "1";
          dom.goalNote.value = "";
          syncGoalTypeFields();
          await refreshAll(true);
          showStatus("目标添加成功", "ok");
        } catch (err) {
          showStatus(err.message, "error");
        }
      }

      async function handleUpdatePhase(event) {
        event.preventDefault();
        try {
          const phaseId = Number(dom.phaseEditId.value);
          if (!phaseId) {
            throw new Error("暂无可编辑阶段");
          }
          await requestJson(`/api/phases/${phaseId}`, {
            method: "PUT",
            body: JSON.stringify({
              name: dom.phaseEditName.value.trim(),
              objective: dom.phaseEditObjective.value.trim(),
              order_index: Number(dom.phaseEditOrder.value || 1),
            }),
          });
          await refreshAll(true);
          showStatus("阶段已更新", "ok");
        } catch (err) {
          showStatus(err.message, "error");
        }
      }

      async function handleDeletePhase() {
        const phaseId = Number(dom.phaseEditId.value);
        if (!phaseId) return;
        if (!window.confirm("删除阶段会一并删除该阶段下所有目标，确认继续？")) return;
        try {
          await requestJson(`/api/phases/${phaseId}`, { method: "DELETE" });
          await refreshAll(true);
          showStatus("阶段已删除", "ok");
        } catch (err) {
          showStatus(err.message, "error");
        }
      }

      async function handleUpdateGoal(event) {
        event.preventDefault();
        try {
          const goalId = Number(dom.goalEditId.value);
          if (!goalId) {
            throw new Error("暂无可编辑目标");
          }
          const goalType = dom.goalEditType.value;
          const issueTotalDi = Number(dom.goalEditIssueTotalDi.value);
          if (goalType === "issue") {
            if (!dom.goalEditIssueModule.value.trim()) {
              throw new Error("问题单型目标必须填写模块");
            }
            if (Number.isNaN(issueTotalDi) || issueTotalDi <= 0) {
              throw new Error("问题单总 DI 必须大于 0");
            }
          }

          await requestJson(`/api/goals/${goalId}`, {
            method: "PUT",
            body: JSON.stringify({
              title: dom.goalEditTitle.value.trim(),
              note: dom.goalEditNote.value.trim() || null,
              owner_participant_id: Number(dom.goalEditOwnerId.value),
              goal_type: goalType,
              requirement_priority: goalType === "requirement" && dom.goalEditRequirementPriority.value
                ? Number(dom.goalEditRequirementPriority.value)
                : null,
              issue_module: goalType === "issue" ? dom.goalEditIssueModule.value.trim() : null,
              issue_total_di: goalType === "issue" ? issueTotalDi : null,
              milestone_date: dom.goalEditMilestoneDate.value,
              deadline: dom.goalEditDeadline.value,
              weight: Number(dom.goalEditWeight.value || 1),
            }),
          });

          await refreshAll(true);
          showStatus("目标已更新", "ok");
        } catch (err) {
          showStatus(err.message, "error");
        }
      }

      async function handleDeleteGoal() {
        const goalId = Number(dom.goalEditId.value);
        if (!goalId) return;
        if (!window.confirm("确认删除该目标？")) return;
        try {
          await requestJson(`/api/goals/${goalId}`, { method: "DELETE" });
          await refreshAll(true);
          showStatus("目标已删除", "ok");
        } catch (err) {
          showStatus(err.message, "error");
        }
      }

      async function handleProgress(event) {
        event.preventDefault();
        try {
          const goalId = Number(dom.progressGoalId.value);
          const goal = state.goalMap.get(goalId);
          const note = dom.progressNote.value.trim();

          let progressPercent = null;
          let remainingDi = null;
          let requirementTotalCount = null;
          let requirementDoneCount = null;
          if (goal && goal.goal_type === "issue") {
            remainingDi = Number(dom.progressRemainingDi.value);
            const latestRemaining = Number(goal.remaining_di ?? goal.issue_total_di ?? 0);
            if (Number.isNaN(remainingDi) || remainingDi < 0) {
              throw new Error("剩余 DI 不能小于 0");
            }
            if (remainingDi > latestRemaining && !note) {
              throw new Error("剩余 DI 增加时必须填写备注");
            }
          } else {
            const totalRaw = dom.progressRequirementTotal.value.trim();
            const doneRaw = dom.progressRequirementDone.value.trim();
            if (totalRaw === "" || doneRaw === "") {
              throw new Error("需求型目标请填写总需求数和已完成需求数");
            }
            requirementTotalCount = Number(totalRaw);
            requirementDoneCount = Number(doneRaw);

            if (Number.isNaN(requirementTotalCount) || requirementTotalCount < 0 || !Number.isInteger(requirementTotalCount)) {
              throw new Error("需求总数必须为大于等于 0 的整数");
            }
            if (Number.isNaN(requirementDoneCount) || requirementDoneCount < 0 || !Number.isInteger(requirementDoneCount)) {
              throw new Error("已完成需求数必须为大于等于 0 的整数");
            }
            if (requirementDoneCount > requirementTotalCount) {
              throw new Error("已完成需求数不能大于总需求数");
            }

            const computedProgress = requirementTotalCount === 0 ? 0 : (requirementDoneCount * 100 / requirementTotalCount);
            if (goal && computedProgress < Number(goal.progress_percent || 0) && !note) {
              throw new Error("回退进度必须填写备注");
            }
          }

          await requestJson("/api/progress", {
            method: "POST",
            body: JSON.stringify({
              goal_id: goalId,
              date: dom.progressDate.value,
              progress_percent: progressPercent,
              remaining_di: remainingDi,
              requirement_total_count: requirementTotalCount,
              requirement_done_count: requirementDoneCount,
              updated_by: dom.progressUpdatedBy.value.trim(),
              note: note || null,
            }),
          });

          dom.progressNote.value = "";
          dom.progressRemainingDi.value = "";
          dom.progressRequirementTotal.value = "";
          dom.progressRequirementDone.value = "";
          await refreshAll(true);
          showStatus("进度更新成功", "ok");
        } catch (err) {
          showStatus(err.message, "error");
        }
      }

      function toggleParticipantField() {
        const isOwner = dom.newRole.value === "owner";
        dom.participantField.classList.toggle("hidden", !isOwner);
      }

      function initDefaults() {
        applyTheme(resolveInitialTheme());
        state.activeMainTab = "dashboard";
        state.activeOpsTab = "project";
        dom.projectDeadline.value = todayISO();
        dom.goalType.value = "requirement";
        dom.goalRequirementPriority.value = "";
        dom.goalIssueModule.value = "";
        dom.goalIssueTotalDi.value = "";
        dom.goalNote.value = "";
        dom.goalEditType.value = "requirement";
        dom.goalEditRequirementPriority.value = "";
        dom.goalEditIssueModule.value = "";
        dom.goalEditIssueTotalDi.value = "";
        dom.goalEditNote.value = "";
        dom.goalMilestoneDate.value = todayISO();
        dom.goalDeadline.value = todayISO();
        dom.progressDate.value = todayISO();
        dom.progressRequirementTotal.value = "";
        dom.progressRequirementDone.value = "";
        dom.progressUpdatedBy.value = "web_user";
        dom.newRole.value = "owner";
        toggleParticipantField();
        syncGoalTypeFields();
        syncGoalEditTypeFields();
        setMainTab("dashboard");
        setOpsTab("project");
      }

      function bindEvents() {
        dom.themeToggle.addEventListener("click", toggleTheme);
        dom.refreshNow.addEventListener("click", () => refreshAll(false));
        dom.logoutBtn.addEventListener("click", handleLogout);

        dom.bootstrapForm.addEventListener("submit", handleBootstrap);
        dom.loginForm.addEventListener("submit", handleLogin);
        dom.createUserForm.addEventListener("submit", handleCreateUser);

        dom.projectForm.addEventListener("submit", handleCreateProject);
        dom.phaseForm.addEventListener("submit", handleCreatePhase);
        dom.goalForm.addEventListener("submit", handleCreateGoal);
        dom.phaseEditForm.addEventListener("submit", handleUpdatePhase);
        dom.goalEditForm.addEventListener("submit", handleUpdateGoal);
        dom.progressForm.addEventListener("submit", handleProgress);
        dom.phaseDeleteBtn.addEventListener("click", handleDeletePhase);
        dom.goalDeleteBtn.addEventListener("click", handleDeleteGoal);

        dom.goalPhaseId.addEventListener("change", syncGoalOwnersByPhase);
        dom.goalType.addEventListener("change", syncGoalTypeFields);
        dom.goalRequirementPriority.addEventListener("change", syncGoalTypeFields);
        dom.progressProjectId.addEventListener("change", syncProgressGoalsByProject);
        dom.progressGoalId.addEventListener("change", syncProgressInputMode);
        dom.newRole.addEventListener("change", toggleParticipantField);
        dom.phaseEditId.addEventListener("change", syncPhaseEditForm);
        dom.goalEditId.addEventListener("change", syncGoalEditForm);
        dom.goalEditType.addEventListener("change", syncGoalEditTypeFields);
        dom.goalEditRequirementPriority.addEventListener("change", syncGoalEditTypeFields);
        dom.tabDashboardBtn.addEventListener("click", () => setMainTab("dashboard"));
        dom.tabAdminBtn.addEventListener("click", () => setMainTab("admin"));
        dom.opsProjectBtn.addEventListener("click", () => setOpsTab("project"));
        dom.opsPhaseBtn.addEventListener("click", () => setOpsTab("phase"));
        dom.opsGoalBtn.addEventListener("click", () => setOpsTab("goal"));
        dom.opsPhaseEditBtn.addEventListener("click", () => setOpsTab("phase-edit"));
        dom.opsGoalEditBtn.addEventListener("click", () => setOpsTab("goal-edit"));
      }

      async function boot() {
        initDefaults();
        bindEvents();

        await setupAuthPanel();
        const loggedIn = await loadMeFromToken();
        if (loggedIn) {
          dom.authPanel.classList.add("hidden");
          updateAuthUi();
          await refreshAll(false);
        } else {
          updateAuthUi();
        }

        setInterval(async () => {
          if (!state.me) return;
          try {
            await refreshAll(true);
          } catch (err) {
            showStatus(err.message, "error");
          }
        }, POLL_MS);
      }

      boot().catch((err) => {
        showStatus(err.message || "初始化失败", "error");
      });
    </script>
  </body>
</html>
